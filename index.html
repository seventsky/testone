<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v13</title>

<style>
body{margin:0;background:#05070a;color:#d1d5db;font-family:monospace;overflow:hidden}

/* LOGIN */
#login{
position:absolute;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
background:black;z-index:9999;
}
#loginBox{background:#111;padding:20px;border:1px solid #0f0}

/* DESKTOP */
.desktop{
position:absolute;width:100%;height:100%;
padding:20px;display:flex;flex-wrap:wrap;gap:20px;
}

.icon{
width:70px;text-align:center;cursor:pointer;user-select:none;
}

/* WINDOWS */
.window{
position:absolute;width:520px;height:360px;
background:#0b0f14;border:1px solid #0f0;
display:none;flex-direction:column;resize:both;overflow:hidden;
}
.titlebar{background:#111;padding:6px;cursor:move}
.content{flex:1;padding:10px;overflow:auto}

/* FILE */
.file{padding:6px;background:#111;margin-bottom:6px;cursor:pointer}
.file:hover{background:rgba(0,255,150,0.2)}

/* EDITOR */
textarea{
width:100%;height:100%;
background:black;color:#0f0;border:none;outline:none;
}

/* MENU */
#contextMenu{
position:absolute;background:#111;border:1px solid #0f0;
}
#contextMenu div{padding:6px;cursor:pointer}
#contextMenu div:hover{background:rgba(0,255,150,0.2)}
</style>
</head>

<body>

<div id="login">
<div id="loginBox">
<input id="user" placeholder="user"><br><br>
<input id="pass" type="password" placeholder="password"><br><br>
<button onclick="enter()">login</button>
</div>
</div>

<div id="desktop" class="desktop"></div>

<script>

/* LOGIN */
function enter(){
if(user.value==="seven"){
login.style.display="none"
init()
}
}

/* STORAGE */
function saveFS(){localStorage.setItem("sevenFS",JSON.stringify(fs))}
function loadFS(){return JSON.parse(localStorage.getItem("sevenFS")||"null")}

/* FILESYSTEM */
let fs=loadFS()||{
"C:":{
"Users":{"Seven":{"notes.txt":"hello"}},
"System":{"log.sys":"protected"}
}
};

let currentPath=["C:"];
let currentFile=null;

function getDir(){return currentPath.reduce((a,b)=>a[b],fs)}
function listDir(){return Object.keys(getDir())}

function readFile(n){return getDir()[n]}
function writeFile(n,c){getDir()[n]=c;saveFS()}

function makeFile(n){getDir()[n]="";saveFS()}
function makeDir(n){getDir()[n]={};saveFS()}

function deleteFile(n){delete getDir()[n];saveFS()}
function renameFile(a,b){let d=getDir();d[b]=d[a];delete d[a];saveFS()}

function isProtected(n){return n.endsWith(".sys")}

/* CORE */
const desktop=document.getElementById("desktop")

function createIcon(name,app){
let d=document.createElement("div")
d.className="icon"
d.innerText=name
d.ondblclick=()=>openApp(app)

/* DRAG ICON */
d.onmousedown=e=>{
let shiftX=e.offsetX,shiftY=e.offsetY
document.onmousemove=ev=>{
d.style.position="absolute"
d.style.left=(ev.pageX-shiftX)+"px"
d.style.top=(ev.pageY-shiftY)+"px"
}
document.onmouseup=()=>document.onmousemove=null
}

desktop.appendChild(d)
}

function createWindow(id,title,html){
let w=document.createElement("div")
w.className="window";w.id=id
w.innerHTML=`<div class="titlebar">${title}</div><div class="content">${html}</div>`
document.body.appendChild(w)
drag(w)
}

function openApp(id){
document.getElementById(id).style.display="flex"
}

function drag(win){
let bar=win.querySelector(".titlebar")
let is=false,x,y
bar.onmousedown=e=>{
is=true;x=e.clientX-win.offsetLeft;y=e.clientY-win.offsetTop}
document.onmousemove=e=>{
if(is){win.style.left=(e.clientX-x)+"px";win.style.top=(e.clientY-y)+"px"}}
document.onmouseup=()=>is=false
}

/* EXPLORER */
function renderExplorer(){
fileList.innerHTML=""
listDir().forEach(i=>{
let d=document.createElement("div")
let isFolder=typeof getDir()[i]==="object"
d.className="file"
d.innerText=(isFolder?"📁 ":"📄 ")+i

d.onclick=()=>{
if(isFolder){currentPath.push(i);renderExplorer()}
else{
currentFile=i
openApp("editor")
editor.value=readFile(i)
}
}

d.oncontextmenu=e=>{
e.preventDefault()
menu(e.clientX,e.clientY,i)
}

fileList.appendChild(d)
})
}

/* MENU */
function menu(x,y,f){
let m=document.getElementById("contextMenu")||document.createElement("div")
m.id="contextMenu"
m.style.left=x+"px";m.style.top=y+"px"

m.innerHTML=`
<div onclick="del('${f}')">🗑 deletar</div>
<div onclick="ren('${f}')">✏ renomear</div>
`
document.body.appendChild(m)
}

document.addEventListener("click",()=>{let m=contextMenu;if(m)m.remove()})

function del(n){
if(isProtected(n)) return alert("protegido")
deleteFile(n);renderExplorer()
}

function ren(n){
let v=prompt("novo nome")
if(v){renameFile(n,v);renderExplorer()}
}

/* TERMINAL */
function term(){
input.onkeydown=e=>{
if(e.key==="Enter"){
let cmd=input.value
out.innerHTML+=`<div>> ${cmd}</div>`
let [b,a]=cmd.split(" ")

if(b==="ls") listDir().forEach(f=>out.innerHTML+=`<div>${f}</div>`)
else if(b==="cd"){currentPath.push(a);renderExplorer()}
else if(b==="touch"){makeFile(a);renderExplorer()}
else if(b==="mkdir"){makeDir(a);renderExplorer()}
else if(b==="rm"){if(!isProtected(a)){deleteFile(a);renderExplorer()}}
else if(b==="cat"){out.innerHTML+=`<div>${readFile(a)||""}</div>`}

input.value=""
}
}
}

/* INIT */
function init(){

createIcon("📁 files","files")
createIcon("⌨ terminal","terminal")
createIcon("📝 editor","editor")

createWindow("files","files.exe","<div id='fileList'></div>")
createWindow("editor","editor.exe","<textarea id='editor'></textarea>")
createWindow("terminal","terminal.exe","<div id='out'></div><input id='input'>")

setTimeout(renderExplorer,100)
setTimeout(term,100)

/* AUTO SAVE EDITOR */
setInterval(()=>{
if(currentFile){
writeFile(currentFile,editor.value)
}
},1000)

/* SISTEMA VIVO */
setInterval(()=>{
if(Math.random()<0.1){
let d=getDir()
if(d["notes.txt"]) d["notes.txt"]="você percebeu?"
saveFS()
}
},10000)

}

</script>

</body>
</html>
