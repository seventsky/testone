<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Blog Terminal</title>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    body {
      background: black;
      color: #00ff00;
      font-family: 'Press Start 2P', monospace;
      padding: 20px;
    }

    .window {
      border: 4px solid #00ff00;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    textarea {
      width: 100%;
      height: 100px;
      background: black;
      color: #00ff00;
      border: 2px solid #00ff00;
      font-family: inherit;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      background: black;
      color: #00ff00;
      border: 2px solid #00ff00;
      padding: 10px;
      cursor: pointer;
    }

    .post {
      border: 2px solid #00ff00;
      margin-top: 20px;
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="window">
  <h1>> BLOG.EXE</h1>

  <h3>> ESCREVER POST</h3>
  <textarea id="input"></textarea>
  <button onclick="addPost()">PUBLICAR</button>

  <div id="posts"></div>
</div>

<script>
  function addPost() {
    const text = document.getElementById("input").value;

    if (text.trim() === "") return;

    const post = document.createElement("div");
    post.className = "post";
    post.innerText = text;

    document.getElementById("posts").prepend(post);

    // salva no navegador
    let saved = JSON.parse(localStorage.getItem("posts") || "[]");
    saved.unshift(text);
    localStorage.setItem("posts", JSON.stringify(saved));

    document.getElementById("input").value = "";
  }

  // carregar posts salvos
  window.onload = () => {
    let saved = JSON.parse(localStorage.getItem("posts") || "[]");
    saved.forEach(text => {
      const post = document.createElement("div");
      post.className = "post";
      post.innerText = text;
      document.getElementById("posts").appendChild(post);
    });
  }
</script>

</body>
</html>
