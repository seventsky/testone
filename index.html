<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v24.1</title>

<style>
:root{
--bg:#05070a;
--panel:#0b0f14;
--text:#d1d5db;
--accent:#00ff9f;
}

body{
margin:0;
font-family:Segoe UI, monospace;
background:#000;
color:var(--text);
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
font-size:22px;
cursor:pointer;
z-index:99999;
}

/* =========================
   DESKTOP (FIX REAL)
========================= */
#desktop{
position:absolute;
inset:0 0 48px 0;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:14px;
padding:20px;
align-content:start;
}

/* ICONS */
.icon{
width:80px;
height:80px;
position:relative;
text-align:center;
cursor:pointer;
padding:10px;
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
transition:.2s;
user-select:none;
}

.icon:hover{
background:rgba(0,255,150,0.08);
transform:scale(1.05);
box-shadow:0 0 10px rgba(0,255,150,0.2);
}

.icon span{
font-size:28px;
}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:48px;
background:#0a0f14;
display:flex;
align-items:center;
padding:0 10px;
}

.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 10px;
border-radius:6px;
cursor:pointer;
background:#111;
}
.task.active{background:#00ff9f33}

#clock{margin-left:auto}

/* WINDOW SYSTEM */
.window{
position:absolute;
width:480px;
height:320px;
background:var(--panel);
border:1px solid #00ff9f33;
border-radius:10px;
display:none;
flex-direction:column;
overflow:hidden;
resize:both;
}

.titlebar{
background:#111;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
user-select:none;
}

.content{
flex:1;
padding:10px;
overflow:auto;
}

button,input,textarea{
background:#000;
color:var(--accent);
border:none;
padding:6px;
width:100%;
margin-bottom:5px;
}
</style>
</head>

<body>

<div id="login" onclick="boot()">🌌 constelação</div>

<div id="desktop"></div>

<div class="taskbar">
<div class="start">◼</div>
<div class="tasks" id="tasks"></div>
<div id="clock"></div>
</div>

<script>

/* ================= CORE ================= */

let Z=1;
let APP_REGISTRY={};

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* LOGIN */
function boot(){
login.style.display="none";
init();
}

/* ================= WINDOW ENGINE ================= */

function createWindow(app){

let w=document.createElement("div");
w.className="window";
w.id=app.id;

w.style.left=(window.innerWidth/2-240)+"px";
w.style.top=(window.innerHeight/2-160)+"px";

w.innerHTML=`
<div class="titlebar">
${app.title}
<div>
<span onclick="min('${app.id}')">—</span>
<span onclick="closeW('${app.id}')">✕</span>
</div>
</div>
<div class="content">${app.content}</div>
`;

document.body.appendChild(w);
drag(w);
}

/* ================= ICON SYSTEM (FIX VISUAL) ================= */

function createIcon(app){
let d=document.createElement("div");
d.className="icon";

d.innerHTML=`
<span>${app.icon}</span>
<div style="font-size:12px;margin-top:5px">${app.title}</div>
`;

d.onclick=()=>openApp(app.id);
desktop.appendChild(d);
}

/* ================= APP SYSTEM ================= */

function registerApp(app){
APP_REGISTRY[app.id]=app;
}

/* ================= OPEN / CLOSE ================= */

function openApp(id){
let w=document.getElementById(id);
if(w){
w.style.display="flex";
focus(w);
}
}

function min(id){
let w=document.getElementById(id);
if(w) w.style.display="none";
}

function closeW(id){min(id);}

/* ================= FOCUS ================= */

function focus(w){
Z++;
w.style.zIndex=Z;
}

/* ================= DRAG ================= */

function drag(win){
let bar=win.querySelector(".titlebar");
let active=false,x=0,y=0;

bar.onmousedown=e=>{
active=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(active){
win.style.left=e.clientX-x+"px";
win.style.top=e.clientY-y+"px";
}
};

document.onmouseup=()=>active=false;
}

/* ================= TASKBAR ================= */

function buildTaskbar(){
let t=document.getElementById("tasks");

Object.keys(APP_REGISTRY).forEach(id=>{
let b=document.createElement("div");
b.className="task";
b.innerText=id;
b.onclick=()=>openApp(id);
t.appendChild(b);
});
}

/* ================= START ================= */

document.querySelector(".start").onclick=()=>{
startMenu.style.display=startMenu.style.display==="block"?"none":"block";
};

/* ================= INIT ================= */

function init(){

buildTaskbar();

/* ================= APPS (RESTAURADOS + FIX) ================= */

registerApp({
id:"files",
title:"files.exe",
icon:"📁",
content:"📁 system.log<br>📁 memory.dat"
});

registerApp({
id:"notes",
title:"notes.exe",
icon:"📝",
content:`<textarea></textarea>`
});

registerApp({
id:"todo",
title:"todo.exe",
icon:"📋",
content:`<input placeholder="task"><button>add</button>`
});

registerApp({
id:"music",
title:"music.exe",
icon:"🎧",
content:`🎧 forfun<br>🌑 xamã<br>☁ mac miller<br>⚡ mgk<br>🌙 sleep token`
});

registerApp({
id:"playlist",
title:"playlist.exe",
icon:"🎵",
content:`
<iframe width="100%" height="180"
src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>
`
});

registerApp({
id:"game",
title:"game.exe",
icon:"🎮",
content:`
<h3>click game</h3>
<button onclick="addScore()">CLICK</button>
<div id="score">0</div>
`
});

registerApp({
id:"search",
title:"search.exe",
icon:"🔍",
content:`<input placeholder="search system">`
});

registerApp({
id:"settings",
title:"settings.exe",
icon:"⚙",
content:`
<button onclick="document.body.style.background='#000'">dark</button>
<button onclick="document.body.style.background='#111'">gray</button>
`
});

/* ================= BUILD SYSTEM ================= */

Object.values(APP_REGISTRY).forEach(app=>{
createWindow(app);
createIcon(app);
});

}

/* ================= GAME ================= */

let score=0;
function addScore(){
score++;
document.getElementById("score").innerText=score;
}

</script>

</body>
</html>
