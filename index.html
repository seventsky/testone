<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v31 - Recovered</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background:#0e1116;
color:#d1d5db;
overflow:hidden;
}

/* GLITCH */
.glitch{animation:glitch 0.2s infinite;}
@keyframes glitch{
0%{transform:translate(0)}
25%{transform:translate(-2px,2px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-1px,1px)}
100%{transform:translate(0)}
}

/* DESKTOP */
#desktop{
position:absolute;
inset:0 0 48px 0;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:12px;
padding:20px;
}

.icon{
width:80px;
text-align:center;
cursor:pointer;
font-size:12px;
}
.icon:hover{background:rgba(255,255,255,0.05);}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:48px;
background:#181c22;
display:flex;
align-items:center;
padding:0 10px;
border-top:1px solid #2a2f36;
}

.start{
background:#232830;
padding:6px 12px;
border-radius:4px;
cursor:pointer;
}

.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 10px;
background:#232830;
border-radius:4px;
cursor:pointer;
font-size:12px;
}

.task.active{background:#3a3f46;}

.tray{
margin-left:auto;
display:flex;
gap:10px;
font-size:12px;
}

/* WINDOW */
.window{
position:absolute;
width:520px;
height:340px;
background:#1f2329;
border:1px solid #2f343b;
border-radius:6px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
}

.titlebar{
background:#2a2f36;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
}

.content{
flex:1;
padding:10px;
overflow:auto;
}

button,input,textarea{
background:#111;
color:#ddd;
border:1px solid #333;
padding:6px;
width:100%;
margin-bottom:5px;
}

/* WIDGETS */
.widget{
position:absolute;
background:rgba(20,25,30,0.7);
border:1px solid #2a2f36;
padding:10px;
border-radius:8px;
font-size:12px;
}

#widget-clock{
top:20px;
right:20px;
font-size:26px;
text-align:right;
}

#widget-system{
bottom:80px;
left:20px;
width:180px;
}

.bar{
height:6px;
background:#333;
border-radius:4px;
overflow:hidden;
margin-top:4px;
}

.bar-fill{
height:100%;
background:#4ade80;
width:40%;
}
</style>
</head>

<body>

<div id="login">✧₊⁺ constelação</div>
<div id="desktop"></div>

<!-- WIDGETS -->
<div class="widget" id="widget-clock"></div>
<div class="widget" id="widget-system">
<div>System Status</div>
<div>CPU</div>
<div class="bar"><div class="bar-fill" id="cpuBar"></div></div>
<div style="margin-top:6px;">Memory: Stable</div>
<div>Network: Connected</div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
<div class="start">◼ Start</div>
<div class="tasks" id="tasks"></div>
<div class="tray">
<span>📶</span>
<span>🔋</span>
<span id="clock"></span>
</div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

/* REFERÊNCIAS */
const desktop = document.getElementById("desktop");
const tasks = document.getElementById("tasks");
const clock = document.getElementById("clock");
const login = document.getElementById("login");

/* CORE */
let Z=1;
let APP_REGISTRY={};
let FILES=[];
let TASKS={};

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* LOGIN */
login.onclick = () => {
login.style.display="none";
init();
};

/* WINDOW */
function createWindow(app){
let w=document.createElement("div");
w.className="window";
w.id=app.id;

w.style.left="200px";
w.style.top="120px";

w.innerHTML=`
<div class="titlebar">
${app.title}
<div>
<span onclick="min('${app.id}')">—</span>
<span onclick="closeW('${app.id}')">✕</span>
</div>
</div>
<div class="content">${app.content}</div>
`;

document.body.appendChild(w);
drag(w);
}

/* ICON */
function createIcon(app){
let d=document.createElement("div");
d.className="icon";

d.innerHTML=`
<div style="font-size:26px">${app.icon}</div>
${app.title}
`;

d.onclick=()=>openApp(app.id);
desktop.appendChild(d);
}

/* TASKBAR */
function addTask(app){
if(TASKS[app.id]) return;

let t=document.createElement("div");
t.className="task";
t.innerText=app.title;

t.onclick=()=>openApp(app.id);

tasks.appendChild(t);
TASKS[app.id]=t;
}

/* OPEN */
function openApp(id){
let w=document.getElementById(id);
let app=APP_REGISTRY[id];
if(!w) return;

w.style.display="flex";
focus(w);
addTask(app);

Object.values(TASKS).forEach(t=>t.classList.remove("active"));
TASKS[id].classList.add("active");
}

/* OUTROS */
function registerApp(app){APP_REGISTRY[app.id]=app;}
function min(id){document.getElementById(id).style.display="none";}
function closeW(id){min(id);}
function focus(w){Z++;w.style.zIndex=Z;}

function drag(win){
let bar=win.querySelector(".titlebar");
let active=false,x=0,y=0;

bar.onmousedown=e=>{
active=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(active){
win.style.left=(e.clientX-x)+"px";
win.style.top=(e.clientY-y)+"px";
}
};

document.onmouseup=()=>active=false;
}

/* FILE */
function openFile(name){
let file=FILES.find(f=>f.name===name);
if(!file) return;

document.getElementById("fileView").value=file.content;

if(name==="dont_open.txt"){
document.body.classList.add("glitch");
setTimeout(()=>document.body.classList.remove("glitch"),800);
}
}

/* INIT */
function init(){

FILES=[
{name:"talvez a verdadeira.log",content:"system active"},
{name:"melodia seja.dat",content:"constelação layer"},
{name:"a conversa.sys",content:"locked profile"},
{name:"entre as estrelas.sec",content:"secure boot active"},
{name:"dont_open.txt",content:"...você não deveria estar aqui"}
];

/* APPS */
registerApp({id:"files",title:"files.exe",icon:"📁",
content:`<h3>FILES</h3>
${FILES.map(f=>`<div onclick="openFile('${f.name}')">📄 ${f.name}</div>`).join("")}
<textarea id="fileView"></textarea>`});

registerApp({id:"notes",title:"notes.exe",icon:"📝",content:`<textarea></textarea>`});
registerApp({id:"playlist",title:"playlist.exe",icon:"🎧",content:`music list...`});
registerApp({id:"music",title:"music.exe",icon:"🎵",
content:`<iframe width="100%" height="180" src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>`});
registerApp({id:"game",title:"game.exe",icon:"🎮",
content:`<button onclick="add()">click</button><div id="g">0</div>`});
registerApp({id:"search",title:"search.exe",icon:"🔍",
content:`<input placeholder="search system">`});
registerApp({id:"settings",title:"settings.exe",icon:"⚙",
content:`<button onclick="document.body.style.background='#000'">dark</button>`});

/* BUILD */
Object.values(APP_REGISTRY).forEach(app=>{
createWindow(app);
createIcon(app);
});
}

/* GAME */
let c=0;
window.add=()=>{c++;document.getElementById("g").innerText=c;};

/* WIDGETS */
setInterval(()=>{
let now=new Date();
document.getElementById("widget-clock").innerHTML=
now.toLocaleTimeString().slice(0,5);
},1000);

setInterval(()=>{
document.getElementById("cpuBar").style.width=Math.random()*100+"%";
},1500);

});
</script>

</body>
</html>
