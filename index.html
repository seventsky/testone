<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v16.3</title>

<style>
:root{
--bg:#05070a;
--bg2:#0f1722;
--panel:#0b0f14;
--text:#d1d5db;
--accent:#00ff9f;
}

body{
margin:0;
font-family:"Segoe UI", monospace;
background:radial-gradient(circle at top,var(--bg2),var(--bg));
color:var(--text);
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

.user{cursor:pointer;text-align:center}
.user:hover{color:var(--accent)}

/* DESKTOP */
.desktop{
position:absolute;
top:0;left:0;
padding:15px;
display:flex;
flex-direction:column;
gap:12px;
}

/* ICON */
.icon{
width:80px;
text-align:center;
cursor:pointer;
padding:6px;
border-radius:8px;
}
.icon:hover{background:rgba(255,255,255,0.05)}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
width:100%;
height:50px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(10,15,20,0.8);
backdrop-filter:blur(10px);
}

.task-container{
display:flex;
gap:10px;
}

.task{
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}
.task.active{background:rgba(0,255,150,0.2)}

.clock{
position:absolute;
right:15px;
}

/* WINDOW */
.window{
position:absolute;
width:500px;height:320px;
background:var(--panel);
border:1px solid rgba(0,255,150,0.2);
border-radius:10px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.titlebar{
background:#111;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
}

.controls span{
margin-left:8px;
cursor:pointer;
}

.content{flex:1;padding:10px;overflow:auto}

.todo{
background:#111;
padding:5px;
margin:4px 0;
cursor:pointer;
}
.done{text-decoration:line-through;opacity:.5}

button{
background:#000;
color:var(--accent);
border:none;
padding:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="login">
<div class="user" onclick="enter()">
🌌<div>constelação</div>
</div>
</div>

<div class="desktop" id="desktop"></div>

<div class="taskbar">
<div class="task-container" id="tasks"></div>
<div class="clock" id="clock"></div>
</div>

<script>

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5)
},1000)

/* LOGIN */
function enter(){
login.style.display="none"
init()
}

/* SYSTEM */
let z=1
function focus(w){z++;w.style.zIndex=z}

/* WINDOW CONTROL */
function openApp(id){
let w=document.getElementById(id)
w.style.display="flex"
focus(w)
setActive(id,true)
}

function minimize(id){
let w=document.getElementById(id)
w.style.display="none"
setActive(id,false)
}

function closeApp(id){
let w=document.getElementById(id)
w.style.display="none"
setActive(id,false)
}

/* TASKBAR */
const apps=["net","files","notes","todo","music","playlist","game"]

function initTaskbar(){
apps.forEach(id=>{
let t=document.createElement("div")
t.className="task"
t.id="task-"+id
t.innerText=id
t.onclick=()=>openApp(id)
tasks.appendChild(t)
})
}

function setActive(id,state){
let t=document.getElementById("task-"+id)
if(t) t.classList.toggle("active",state)
}

/* DRAG */
function drag(win){
let bar=win.querySelector(".titlebar")
let is=false,x,y

bar.onmousedown=e=>{
is=true
x=e.clientX-win.offsetLeft
y=e.clientY-win.offsetTop
focus(win)
}

document.onmousemove=e=>{
if(is){
win.style.left=e.clientX-x+"px"
win.style.top=e.clientY-y+"px"
}
}

document.onmouseup=()=>is=false
}

/* WINDOW */
function createWindow(id,title,html){
let w=document.createElement("div")
w.className="window"
w.id=id

w.innerHTML=`
<div class="titlebar">
${title}
<div class="controls">
<span onclick="minimize('${id}')">—</span>
<span onclick="closeApp('${id}')">✕</span>
</div>
</div>
<div class="content">${html}</div>
`

document.body.appendChild(w)
w.style.top="100px"
w.style.left="200px"

drag(w)
}

/* ICON */
function icon(name,id){
let d=document.createElement("div")
d.className="icon"
d.innerHTML=name
d.ondblclick=()=>openApp(id)
desktop.appendChild(d)
}

/* MUSIC INTERATIVO */
function showArtist(name){
alert("🎧 "+name)
}

/* TODO */
function addTodo(){
let val=todoInput.value
if(!val) return
let list=JSON.parse(localStorage.getItem("todo")||"[]")
list.push({t:val,d:false})
localStorage.setItem("todo",JSON.stringify(list))
renderTodo()
todoInput.value=""
}

function renderTodo(){
let list=JSON.parse(localStorage.getItem("todo")||"[]")
todoList.innerHTML=""
list.forEach(e=>{
let d=document.createElement("div")
d.className="todo "+(e.d?"done":"")
d.innerText=e.t
d.onclick=()=>{
e.d=!e.d
localStorage.setItem("todo",JSON.stringify(list))
renderTodo()
}
todoList.appendChild(d)
})
}

/* GAME */
let score=0
function clickGame(){
score++
gameScore.innerText="score: "+score
}

/* INIT */
function init(){

initTaskbar()

icon("🌐<br>net","net")
icon("📁<br>files","files")
icon("📝<br>notes","notes")
icon("📋<br>todo","todo")
icon("🎧<br>music","music")
icon("🎵<br>playlist","playlist")
icon("🎮<br>game","game")

createWindow("music","music.exe",`
<div onclick="showArtist('forfun')">🎧 forfun</div>
<div onclick="showArtist('xamã')">🌑 xamã</div>
<div onclick="showArtist('mac miller')">☁ mac miller</div>
`)

createWindow("todo","todo.exe",`
<input id="todoInput">
<button onclick="addTodo()">add</button>
<div id="todoList"></div>
`)

createWindow("game","game.exe",`
<button onclick="clickGame()">click me</button>
<div id="gameScore">score: 0</div>
`)

renderTodo()

}

</script>

</body>
</html>
