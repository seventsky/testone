<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v24.5</title>

<style>
body{
margin:0;
font-family:Segoe UI, monospace;
background:#000;
color:#d1d5db;
overflow:hidden;
}

#login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
font-size:22px;
cursor:pointer;
z-index:99999;
}

#desktop{
position:absolute;
inset:0 0 48px 0;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:14px;
padding:20px;
align-content:start;
}

.icon{
width:80px;
height:80px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
transition:.2s;
user-select:none;
}

.icon:hover{
background:rgba(0,255,150,0.08);
transform:scale(1.05);
}

.taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:48px;
background:#0a0f14;
display:flex;
align-items:center;
padding:0 10px;
}

.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 10px;
border-radius:6px;
cursor:pointer;
background:#111;
}

.task.active{
background:#00ff9f33;
}

#clock{
margin-left:auto;
}

.window{
position:absolute;
width:520px;
height:340px;
background:#0b0f14;
border:1px solid #00ff9f33;
border-radius:10px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
}

.titlebar{
background:#111;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
user-select:none;
}

.content{
flex:1;
padding:10px;
overflow:auto;
}

button,input,textarea{
background:#000;
color:#00ff9f;
border:none;
padding:6px;
width:100%;
margin-bottom:5px;
}
</style>
</head>

<body>

<div id="login" onclick="boot()">✧₊⁺ constelação</div>

<div id="desktop"></div>

<div class="taskbar">
<div>◼</div>
<div class="tasks" id="tasks"></div>
<div id="clock"></div>
</div>

<script>

/* ================= CORE ================= */

let Z=1;
let APP_REGISTRY={};
let FILES=[];

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* LOGIN */
function boot(){
login.style.display="none";
init();
}

/* ================= WINDOW ================= */

function createWindow(app){

let w=document.createElement("div");
w.className="window";
w.id=app.id;

w.style.left=(window.innerWidth/2-260)+"px";
w.style.top=(window.innerHeight/2-170)+"px";

w.innerHTML=`
<div class="titlebar">
${app.title}
<div>
<span onclick="min('${app.id}')">—</span>
<span onclick="closeW('${app.id}')">✕</span>
</div>
</div>
<div class="content">${app.content}</div>
`;

document.body.appendChild(w);
drag(w);
}

/* ICONS */
function createIcon(app){
let d=document.createElement("div");
d.className="icon";

d.innerHTML=`
<span style="font-size:26px">${app.icon}</span>
<div style="font-size:11px">${app.title}</div>
`;

d.onclick=()=>openApp(app.id);
desktop.appendChild(d);
}

/* SYSTEM */
function registerApp(app){
APP_REGISTRY[app.id]=app;
}

/* OPEN */
function openApp(id){
let w=document.getElementById(id);
if(!w) return;
w.style.display="flex";
focus(w);
}

/* MIN / CLOSE */
function min(id){
document.getElementById(id).style.display="none";
}

function closeW(id){min(id);}

/* FOCUS */
function focus(w){
Z++;
w.style.zIndex=Z;
}

/* ================= DRAG ================= */

function drag(win){
let bar=win.querySelector(".titlebar");
let active=false,x=0,y=0;

bar.onmousedown=e=>{
active=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(active){
win.style.left=(e.clientX-x)+"px";
win.style.top=(e.clientY-y)+"px";
}
};

document.onmouseup=()=>active=false;
}

/* ================= TASKBAR UPGRADE ================= */

function upgradeTaskbar(){

let tasks=document.querySelector(".tasks");
if(!tasks) return;

document.querySelectorAll(".task").forEach(t=>{
t.style.width="38px";
t.style.height="38px";
t.style.display="flex";
t.style.alignItems="center";
t.style.justifyContent="center";
t.style.border="1px solid rgba(0,255,150,0.15)";
t.style.borderRadius="6px";
t.style.transition=".2s";

t.onmouseenter=()=>{
t.style.background="rgba(0,255,150,0.15)";
t.style.transform="scale(1.1)";
};

t.onmouseleave=()=>{
t.style.background="#111";
t.style.transform="scale(1)";
};

});

}

/* ================= FILES UPGRADE ================= */

function upgradeFiles(){

let files=document.getElementById("files");
if(!files) return;

let items=files.querySelectorAll(".content div");

items.forEach(item=>{

item.style.padding="6px";
item.style.cursor="pointer";

item.onmouseenter=()=>{
item.style.background="rgba(0,255,150,0.15)";
};

item.onmouseleave=()=>{
item.style.background="transparent";
};

item.onclick=()=>{
items.forEach(i=>i.style.background="transparent");
item.style.background="rgba(0,255,150,0.25)";
};

});

}

/* ================= SEARCH HACK (MANTIDO + GARANTIDO) ================= */

function searchHack(){

let input=document.querySelector("#search input");

if(!input) return;

input.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

let val=input.value;

let w=document.getElementById("search");

if(!w) return;

w.querySelector(".content").innerHTML=`
<div style="text-align:center;padding:20px">
<div style="font-size:40px">👾</div>
<h2>SISTEMA INVADIDO</h2>
<p>${val}</p>
</div>
`;

}

});

}

/* ================= INIT ================= */

function init(){

FILES=[
{name:"talvez a verdadeira.log",content:"system active"},
{name:"melodia seja.dat",content:"constelação layer"},
{name:"a conversa.sys",content:"locked profile"},
{name:"entre as estrelas.sec",content:"secure boot active"}
];

/* FILES */
registerApp({
id:"files",
title:"files.exe",
icon:"📁",
content:`
<h3>FILES SYSTEM</h3>
${FILES.map(f=>`<div onclick="openFile('${f.name}')">📄 ${f.name}</div>`).join("")}
<textarea id="fileView"></textarea>
`
});

/* NOTES */
registerApp({
id:"notes",
title:"notes.exe",
icon:"📝",
content:`<textarea></textarea>`
});

/* SECRETS */
registerApp({
id:"secrets",
title:"secrets.exe",
icon:"🔐",
content:`
<textarea id="sec"></textarea>
<button onclick="out.innerText=encode(sec.value)">encode</button>
<button onclick="out.innerText=decode(sec.value)">decode</button>
<div id="out"></div>
`
});

/* MUSIC */
registerApp({
id:"music",
title:"music.exe",
icon:"🎧",
content:`forfun<br>xamã<br>mac miller<br>MGK<br>sleeptoken<br>kehlani`
});

/* PLAYLIST */
registerApp({
id:"playlist",
title:"playlist.exe",
icon:"🎵",
content:`<iframe width="100%" height="180"
src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>`
});

/* GAME */
registerApp({
id:"game",
title:"game.exe",
icon:"🎮",
content:`<button onclick="add()">click</button><div id="g">0</div>`
});

/* SEARCH */
registerApp({
id:"search",
title:"search.exe",
icon:"🔍",
content:`<input placeholder="search system">`
});

/* SETTINGS */
registerApp({
id:"settings",
title:"settings.exe",
icon:"⚙",
content:`
<button onclick="document.body.style.background='#000'">dark</button>
<button onclick="document.body.style.background='#e5e7eb'">light</button>
`
});

/* BUILD */
Object.values(APP_REGISTRY).forEach(app=>{
createWindow(app);
createIcon(app);
});

/* PATCHES ATIVADOS */
setTimeout(()=>{
upgradeFiles();
upgradeTaskbar();
searchHack();
},500);

}

/* GAME */
let c=0;
function add(){
c++;
document.getElementById("g").innerText=c;
}

/* CRYPTO */
function encode(t){return btoa(unescape(encodeURIComponent(t)))}
function decode(t){try{return decodeURIComponent(escape(atob(t)))}catch(e){return "erro"}}

</script>

</body>
</html>
