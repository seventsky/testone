<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v20</title>

<style>
:root{
--bg:#05070a;
--bg2:#0f1722;
--panel:#0b0f14;
--text:#d1d5db;
--accent:#00ff9f;
}

body{
margin:0;
font-family:"Segoe UI", monospace;
background:radial-gradient(circle at top,var(--bg2),var(--bg));
color:var(--text);
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
cursor:pointer;
}

/* DESKTOP */
.desktop{
position:absolute;
width:100%;
height:calc(100% - 48px);
}

/* ICON */
.icon{
width:80px;
position:absolute;
text-align:center;
cursor:pointer;
padding:6px;
border-radius:8px;
}
.icon:hover{background:rgba(255,255,255,0.05)}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
width:100%;
height:48px;
background:rgba(10,15,20,0.85);
display:flex;
align-items:center;
padding:0 10px;
}

.start{
padding:6px;
cursor:pointer;
}

.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 10px;
cursor:pointer;
border-radius:6px;
}
.task.active{background:rgba(0,255,150,0.2)}

.clock{margin-left:auto}

/* WINDOW */
.window{
position:absolute;
width:520px;height:360px;
background:var(--panel);
border:1px solid rgba(0,255,150,0.2);
border-radius:10px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.titlebar{
background:#111;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
}

.controls span{
margin-left:8px;
cursor:pointer;
}

.content{flex:1;padding:10px;overflow:auto}

/* UI */
button{
background:#000;
color:var(--accent);
border:none;
padding:5px;
cursor:pointer;
}

input,textarea{
width:100%;
background:#000;
color:var(--accent);
border:none;
padding:5px;
}
</style>
</head>

<body>

<div id="login" onclick="enter()">🌌 constelação</div>

<div class="desktop" id="desktop"></div>

<div class="taskbar">
<div class="start">◼</div>
<div class="tasks" id="tasks"></div>
<div class="clock" id="clock"></div>
</div>

<script>

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5)
},1000)

/* LOGIN */
function enter(){
login.style.display="none"
init()
}

/* SYSTEM */
let z=1
function focus(w){z++;w.style.zIndex=z}

/* WINDOW CONTROL */
function openApp(id){
let w=document.getElementById(id)
w.style.display="flex"
focus(w)
setActive(id,true)
}

function minimize(id){
document.getElementById(id).style.display="none"
setActive(id,false)
}

function closeApp(id){
document.getElementById(id).style.display="none"
setActive(id,false)
}

/* TASKBAR */
const apps=["files","notes","todo","music","playlist","game","search"]

function initTaskbar(){
apps.forEach(id=>{
let t=document.createElement("div")
t.className="task"
t.id="task-"+id
t.innerText=id
t.onclick=()=>openApp(id)
tasks.appendChild(t)
})
}

function setActive(id,state){
let t=document.getElementById("task-"+id)
if(t) t.classList.toggle("active",state)
}

/* DRAG WINDOW */
function drag(win){
let bar=win.querySelector(".titlebar")
let is=false,x,y

bar.onmousedown=e=>{
is=true
x=e.clientX-win.offsetLeft
y=e.clientY-win.offsetTop
focus(win)
}

document.onmousemove=e=>{
if(is){
win.style.left=e.clientX-x+"px"
win.style.top=e.clientY-y+"px"
}
}

document.onmouseup=()=>is=false
}

/* WINDOW CREATE */
function createWindow(id,title,html){
let w=document.createElement("div")
w.className="window"
w.id=id

w.innerHTML=`
<div class="titlebar">
${title}
<div class="controls">
<span onclick="minimize('${id}')">—</span>
<span onclick="closeApp('${id}')">✕</span>
</div>
</div>
<div class="content">${html}</div>
`

document.body.appendChild(w)
drag(w)
}

/* ICON */
function icon(name,id,x,y){
let d=document.createElement("div")
d.className="icon"
d.innerHTML=name
d.style.left=x+"px"
d.style.top=y+"px"
d.ondblclick=()=>openApp(id)
desktop.appendChild(d)
}

/* FILE SYSTEM */
let fs=JSON.parse(localStorage.getItem("fs")||"null")||{
name:"root",folders:[],files:[]
}
let current=fs

function saveFS(){localStorage.setItem("fs",JSON.stringify(fs))}

function renderFS(){
explorer.innerHTML="<b>"+current.name+"</b><br><br>"

current.folders.forEach(f=>{
let d=document.createElement("div")
d.innerText="📁 "+f.name
d.onclick=()=>{current=f;renderFS()}
explorer.appendChild(d)
})

current.files.forEach(f=>{
let d=document.createElement("div")
d.innerText="📄 "+f.name
d.onclick=()=>openFile(f)
explorer.appendChild(d)
})
}

function newFolder(){
let n=prompt("nome pasta")
if(!n) return
current.folders.push({name:n,folders:[],files:[]})
saveFS();renderFS()
}

function newFile(){
let n=prompt("nome arquivo")
if(!n) return
current.files.push({name:n,content:""})
saveFS();renderFS()
}

let currentFile=null
function openFile(f){
openApp("notes")
note.value=f.content
currentFile=f
}

function saveNote(){
if(currentFile){
currentFile.content=note.value
saveFS()
}
}

/* GAME */
let score=0
function clickGame(){
score++
gameScore.innerText="score "+score
}

/* INIT */
function init(){

initTaskbar()

icon("📁<br>files","files",20,20)
icon("📝<br>notes","notes",20,110)
icon("📋<br>todo","todo",20,200)
icon("🎧<br>music","music",120,20)
icon("🎵<br>playlist","playlist",120,110)
icon("🎮<br>game","game",120,200)

createWindow("files","files.exe",`
<button onclick="newFolder()">+ pasta</button>
<button onclick="newFile()">+ arquivo</button>
<div id="explorer"></div>
`)

createWindow("notes","notes.exe",`
<textarea id="note" oninput="saveNote()"></textarea>
`)

createWindow("game","game.exe",`
<button onclick="clickGame()">click</button>
<div id="gameScore">score 0</div>
`)

renderFS()

}

</script>
</body>
</html>
