<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v21.1</title>

<style>
:root{
--bg:#05070a;
--bg2:#0f1722;
--panel:#0b0f14;
--text:#d1d5db;
--accent:#00ff9f;
}

/* LIGHT MODE */
.light{
--bg:#e5e7eb;
--bg2:#cbd5e1;
--panel:#ffffff;
--text:#111;
--accent:#0f172a;
}

body{
margin:0;
font-family:"Segoe UI", monospace;
background:radial-gradient(circle at top,var(--bg2),var(--bg));
color:var(--text);
overflow:hidden;
}

.light body{
background:linear-gradient(var(--bg2),var(--bg));
color:var(--text);
}

.light .window{background:var(--panel)}
.light .taskbar{background:rgba(255,255,255,0.8)}
.light .start-menu{background:#fff}
.light .widget{background:#fff}

/* LOGIN */
#login{
position:fixed;
width:100%;height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
cursor:pointer;
font-size:22px;
}

/* DESKTOP */
.desktop{
position:absolute;
width:100%;
height:calc(100% - 48px);
}

/* ICON */
.icon{
width:80px;
position:absolute;
text-align:center;
cursor:pointer;
padding:6px;
border-radius:8px;
}
.icon:hover{background:rgba(255,255,255,0.05)}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
width:100%;
height:48px;
background:rgba(10,15,20,0.85);
display:flex;
align-items:center;
padding:0 10px;
backdrop-filter:blur(10px);
}

.start{cursor:pointer;padding:6px}

.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 10px;
cursor:pointer;
border-radius:6px;
}
.task.active{background:rgba(0,255,150,0.2)}

.clock{margin-left:auto}

/* WINDOW */
.window{
position:absolute;
width:520px;height:360px;
background:var(--panel);
border:1px solid rgba(0,255,150,0.2);
border-radius:10px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
opacity:0;
transition:.2s;
}

.window.active{
box-shadow:0 0 20px rgba(0,255,150,0.3);
}

.titlebar{
background:#111;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
}

.controls span{
margin-left:8px;
cursor:pointer;
}

.content{flex:1;padding:10px;overflow:auto}

/* START MENU */
.start-menu{
position:fixed;
bottom:60px;
left:10px;
width:240px;
background:#111;
border-radius:10px;
display:none;
padding:10px;
}

.start-item{
padding:8px;
cursor:pointer;
}
.start-item:hover{background:rgba(0,255,150,0.1)}

/* NOTIFICATIONS */
.notifications{
position:fixed;
right:10px;
bottom:60px;
width:220px;
}
.notif{
background:#111;
padding:8px;
margin-top:6px;
border-radius:6px;
}

/* WIDGETS */
.widgets{
position:fixed;
top:10px;
right:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.widget{
background:#111;
padding:10px;
border-radius:8px;
}

/* UI */
button,input,textarea{
background:#000;
color:var(--accent);
border:none;
padding:5px;
width:100%;
margin-bottom:5px;
}

.todo{background:#111;padding:5px;margin:3px 0;cursor:pointer}
.done{opacity:.5;text-decoration:line-through}
</style>
</head>

<body>

<div id="login" onclick="enter()">🌌 constelação</div>

<div class="desktop" id="desktop"></div>

<div class="taskbar">
<div class="start">◼</div>
<div class="tasks" id="tasks"></div>
<div class="clock" id="clock"></div>
</div>

<div class="start-menu" id="startMenu"></div>
<div class="notifications" id="notifications"></div>

<div class="widgets">
<div class="widget" id="widgetClock"></div>
<div class="widget" id="widgetSys"></div>
</div>

<script>

/* THEME SYSTEM */
function setTheme(mode){
if(mode==="light"){
document.documentElement.classList.add("light")
localStorage.setItem("theme","light")
}else{
document.documentElement.classList.remove("light")
localStorage.setItem("theme","dark")
}
}

(function(){
let saved=localStorage.getItem("theme")
if(saved==="light") setTheme("light")
})()

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5)
widgetClock.innerText="🕒 "+clock.innerText
widgetSys.innerText="⚡ system active"
},1000)

/* LOGIN */
function enter(){
login.style.display="none"
init()
}

/* SYSTEM */
let z=1
function focus(w){
z++
w.style.zIndex=z
document.querySelectorAll(".window").forEach(x=>x.classList.remove("active"))
w.classList.add("active")
}

/* WINDOW */
function openApp(id){
let w=document.getElementById(id)
w.style.display="flex"
setTimeout(()=>w.style.opacity=1,10)
focus(w)
setActive(id,true)
}

function minimize(id){
let w=document.getElementById(id)
w.style.opacity=0
setTimeout(()=>w.style.display="none",200)
setActive(id,false)
}

function closeApp(id){minimize(id)}

/* TASKBAR */
const apps=["files","notes","todo","music","playlist","game","search","settings"]

function initTaskbar(){
apps.forEach(id=>{
let t=document.createElement("div")
t.className="task"
t.id="task-"+id
t.innerText=id
t.onclick=()=>openApp(id)
tasks.appendChild(t)
})
}

/* START MENU */
document.querySelector(".start").onclick=()=>{
startMenu.style.display=
startMenu.style.display==="block"?"none":"block"
}

function buildStartMenu(){
apps.forEach(a=>{
let d=document.createElement("div")
d.className="start-item"
d.innerText=a
d.onclick=()=>openApp(a)
startMenu.appendChild(d)
})
}

/* NOTIFY */
function notify(text){
let n=document.createElement("div")
n.className="notif"
n.innerText=text
notifications.appendChild(n)
setTimeout(()=>n.remove(),3000)
}

/* DRAG */
function drag(win){
let bar=win.querySelector(".titlebar")
let is=false,x,y

bar.onmousedown=e=>{
is=true
x=e.clientX-win.offsetLeft
y=e.clientY-win.offsetTop
focus(win)
}

document.onmousemove=e=>{
if(is){
win.style.left=e.clientX-x+"px"
win.style.top=e.clientY-y+"px"
}
}

document.onmouseup=()=>is=false
}

/* SNAP */
document.addEventListener("mouseup",()=>{
document.querySelectorAll(".window").forEach(w=>{
let r=w.getBoundingClientRect()
if(r.top<10){
w.style.top="0"
w.style.left="0"
w.style.width="100%"
w.style.height="calc(100% - 48px)"
}
})
})

/* WINDOW CREATE */
function createWindow(id,title,html){
let w=document.createElement("div")
w.className="window"
w.id=id

w.innerHTML=`
<div class="titlebar">
${title}
<div class="controls">
<span onclick="minimize('${id}')">—</span>
<span onclick="closeApp('${id}')">✕</span>
</div>
</div>
<div class="content">${html}</div>
`

document.body.appendChild(w)
drag(w)
}

/* ICON */
function icon(name,id,x,y){
let d=document.createElement("div")
d.className="icon"
d.innerHTML=name
d.style.left=x+"px"
d.style.top=y+"px"
d.ondblclick=()=>openApp(id)
desktop.appendChild(d)
}

/* FILES */
let fs=JSON.parse(localStorage.getItem("fs")||"null")||{files:[]}
function saveFS(){localStorage.setItem("fs",JSON.stringify(fs))}

function renderFS(){
explorer.innerHTML=""
fs.files.forEach(f=>{
let d=document.createElement("div")
d.innerText="📄 "+f.name
d.onclick=()=>openFile(f)
explorer.appendChild(d)
})
}

function newFile(){
let n=prompt("nome")
if(!n)return
fs.files.push({name:n,content:""})
saveFS();renderFS()
}

let currentFile=null
function openFile(f){
openApp("notes")
note.value=f.content
currentFile=f
}
function saveNote(){
if(currentFile){
currentFile.content=note.value
saveFS()
}
}

/* TODO */
function addTodo(){
let val=todoInput.value
if(!val)return
let list=JSON.parse(localStorage.getItem("todo")||"[]")
list.push({t:val,d:false})
localStorage.setItem("todo",JSON.stringify(list))
renderTodo()
todoInput.value=""
}
function renderTodo(){
let list=JSON.parse(localStorage.getItem("todo")||"[]")
todoList.innerHTML=""
list.forEach(e=>{
let d=document.createElement("div")
d.className="todo "+(e.d?"done":"")
d.innerText=e.t
d.onclick=()=>{
e.d=!e.d
localStorage.setItem("todo",JSON.stringify(list))
renderTodo()
}
todoList.appendChild(d)
})
}

/* SEARCH */
function searchSystem(q){
let res=[]
fs.files.forEach(f=>{
if(f.name.includes(q)) res.push(f.name)
})
searchResults.innerHTML=res.join("<br>")
}

/* GAME */
let score=0
function clickGame(){
score++
gameScore.innerText="score "+score
}

/* INIT */
function init(){

initTaskbar()
buildStartMenu()
notify("Seven OS iniciado")

icon("📁<br>files","files",20,20)
icon("📝<br>notes","notes",20,110)
icon("📋<br>todo","todo",20,200)
icon("🎧<br>music","music",120,20)
icon("🎵<br>playlist","playlist",120,110)
icon("🎮<br>game","game",120,200)
icon("🔍<br>search","search",220,20)
icon("⚙<br>settings","settings",220,110)

/* WINDOWS */

createWindow("files","files.exe",`
<button onclick="newFile()">+ arquivo</button>
<div id="explorer"></div>
`)

createWindow("notes","notes.exe",`
<textarea id="note" oninput="saveNote()"></textarea>
`)

createWindow("todo","todo.exe",`
<input id="todoInput">
<button onclick="addTodo()">add</button>
<div id="todoList"></div>
`)

createWindow("music","music.exe",`
<div onclick="this.innerHTML='🎧 forfun - vibe única'">🎧 forfun</div>
<div onclick="this.innerHTML='🌑 xamã - energia'">🌑 xamã</div>
<div onclick="this.innerHTML='☁ mac miller - introspectivo'">☁ mac miller</div>
`)

createWindow("playlist","playlist.exe",`
<iframe width="100%" height="200"
src="https://www.youtube.com/embed/jfKfPfyJRdk"
frameborder="0" allowfullscreen></iframe>
`)

createWindow("game","game.exe",`
<button onclick="clickGame()">click</button>
<div id="gameScore">score 0</div>
`)

createWindow("search","search.exe",`
<input oninput="searchSystem(this.value)" placeholder="buscar...">
<div id="searchResults"></div>
`)

createWindow("settings","settings.exe",`
<h3>⚙ settings</h3>
<button onclick="setTheme('dark')">🌙 tema escuro</button>
<button onclick="setTheme('light')">☀ tema claro</button>
`)

renderFS()
renderTodo()

}

</script>
</body>
</html>
