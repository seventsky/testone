<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v23</title>

<style>
:root{
--bg:#05070a;
--bg2:#0f1722;
--panel:#0b0f14;
--text:#d1d5db;
--accent:#00ff9f;
}

.light{
--bg:#e5e7eb;
--bg2:#cbd5e1;
--panel:#ffffff;
--text:#111;
--accent:#0f172a;
}

body{
margin:0;
font-family:"Segoe UI", monospace;
background:#000;
color:var(--text);
overflow:hidden;
}

.wallpaper-1{background:#000}
.wallpaper-2{background:linear-gradient(135deg,#020617,#000)}
.wallpaper-3{background:radial-gradient(circle,#001f1a,#000)}

#login{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
cursor:pointer;
font-size:22px;
}

.desktop{
position:absolute;
width:100%;
height:calc(100% - 48px);
}

.icon{
width:80px;
position:absolute;
text-align:center;
cursor:pointer;
padding:6px;
border-radius:8px;
transition:.2s;
user-select:none;
}
.icon:hover{
background:rgba(255,255,255,0.05);
transform:scale(1.05);
}

.taskbar{
position:fixed;
bottom:0;
width:100%;
height:48px;
background:rgba(10,15,20,0.85);
display:flex;
align-items:center;
padding:0 10px;
backdrop-filter:blur(10px);
}

.start{cursor:pointer;padding:6px}

.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 10px;
cursor:pointer;
border-radius:6px;
}
.task.active{background:rgba(0,255,150,0.2)}

.clock{margin-left:auto}

.window{
position:absolute;
width:480px;
height:320px;
background:var(--panel);
border:1px solid rgba(0,255,150,0.2);
border-radius:10px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
opacity:0;
transition:.2s;
}

.window.active{
box-shadow:0 0 25px rgba(0,255,150,0.35);
}

.titlebar{
background:#111;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
}

.content{
flex:1;
padding:10px;
overflow:auto;
}

button,input,textarea{
background:#000;
color:var(--accent);
border:none;
padding:6px;
width:100%;
margin-bottom:5px;
}

.preview{
margin-top:10px;
padding:8px;
border:1px solid var(--accent);
background:#000;
}
</style>
</head>

<body class="wallpaper-1">

<div id="login" onclick="enter()">🌌 constelação</div>

<div class="desktop" id="desktop"></div>

<div class="taskbar">
<div class="start">◼</div>
<div class="tasks" id="tasks"></div>
<div class="clock" id="clock"></div>
</div>

<script>

/* ===================== CORE ===================== */

let z=1;

function focus(w){
z++;
w.style.zIndex=z;
document.querySelectorAll(".window").forEach(x=>x.classList.remove("active"));
w.classList.add("active");
}

/* LOGIN */
function enter(){
login.style.display="none";
init();
}

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* ===================== SOUND ===================== */

function clickSound(){
let a=new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
a.volume=0.2;
a.play();
}

/* ===================== THEME ===================== */

function setTheme(m){
if(m==="light") document.body.classList.add("light");
else document.body.classList.remove("light");
localStorage.setItem("theme",m);
}

(function(){
if(localStorage.getItem("theme")==="light"){
document.body.classList.add("light");
}
})();

/* ===================== WALLPAPER ===================== */

function setWallpaper(n){
document.body.className="wallpaper-"+n;
localStorage.setItem("wallpaper",n);
}

(function(){
setWallpaper(localStorage.getItem("wallpaper")||1);
})();

/* ===================== WINDOW SYSTEM ===================== */

function createWindow(id,title,html){

let w=document.createElement("div");
w.className="window";
w.id=id;

w.style.left=(window.innerWidth/2-240)+"px";
w.style.top=(window.innerHeight/2-160)+"px";

w.innerHTML=`
<div class="titlebar">
${title}
<div>
<span onclick="min('${id}')">—</span>
<span onclick="closeW('${id}')">✕</span>
</div>
</div>
<div class="content">${html}</div>
`;

document.body.appendChild(w);
drag(w);
}

function openApp(id){
clickSound();
let w=document.getElementById(id);
w.style.display="flex";
setTimeout(()=>w.style.opacity=1,10);
focus(w);
}

function min(id){
let w=document.getElementById(id);
w.style.opacity=0;
setTimeout(()=>w.style.display="none",200);
}

function closeW(id){min(id);}

/* DRAG */
function drag(win){
let bar=win.querySelector(".titlebar");
let active=false,x=0,y=0;

bar.onmousedown=e=>{
active=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(active){
win.style.left=e.clientX-x+"px";
win.style.top=e.clientY-y+"px";
}
};

document.onmouseup=()=>active=false;
}

/* ===================== GAME v23 UPGRADE ===================== */

let gameScore = parseInt(localStorage.getItem("gameScore")||"0");

function gameClick(){
gameScore++;
localStorage.setItem("gameScore",gameScore);
document.getElementById("gameScore").innerText="score: "+gameScore;
}

function gameReset(){
gameScore=0;
localStorage.setItem("gameScore",0);
document.getElementById("gameScore").innerText="score: 0";
}

/* ===================== INIT ===================== */

function init(){

createWindow("files","files.exe",`📄 system.log`);

createWindow("notes","notes.exe",`
<textarea id="note"></textarea>
<div id="preview"></div>
`);

createWindow("todo","todo.exe",`
<input placeholder="task">
<button>add</button>
`);

createWindow("music","music.exe",`
🎧 forfun<br>🌑 xamã<br>☁ mac miller<br>⚡ mgk<br>🌙 sleep token
`);

createWindow("playlist","playlist.exe",`
<iframe width="100%" height="180"
src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>
`);

createWindow("game","game.exe",`
<div style="text-align:center">
<h3>🎮 click system v23</h3>

<button onclick="gameClick()">CLICK</button>

<div id="gameScore">score: ${gameScore}</div>

<button onclick="gameReset()">reset</button>
</div>
`);

createWindow("search","search.exe",`
<input placeholder="search system">
<div>no results</div>
`);

createWindow("settings","settings.exe",`
<h3>settings</h3>

<button onclick="setTheme('dark')">🌙 dark</button>
<button onclick="setTheme('light')">☀ light</button>

<button onclick="setWallpaper(1)">wall 1</button>
<button onclick="setWallpaper(2)">wall 2</button>
<button onclick="setWallpaper(3)">wall 3</button>
`);

}

</script>
</body>
</html>
