<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: black;
  color: #00ff9f;
}

/* LOGIN */
#login {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#login input {
  background: black;
  border: 1px solid #00ff9f;
  color: #00ff9f;
  padding: 10px;
}

/* DESKTOP */
#desktop {
  display: none;
  height: 100vh;
}

/* Ícones */
.icon {
  margin: 20px;
  cursor: pointer;
}

/* Terminal */
.window {
  position: absolute;
  width: 500px;
  height: 300px;
  background: black;
  border: 1px solid #00ff9f;
  display: none;
  flex-direction: column;
}

.title {
  background: #001f14;
  padding: 5px;
  display: flex;
  justify-content: space-between;
  cursor: move;
}

.terminal {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

input.cmd {
  width: 100%;
  background: black;
  border: none;
  color: #00ff9f;
}

/* Barra */
.taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #001f14;
  padding: 5px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Seven OS</h2>
  <input type="password" id="pass" placeholder="senha">
</div>

<!-- DESKTOP -->
<div id="desktop">

  <div class="icon" onclick="openWin()">🖥️ Terminal</div>

  <div class="window" id="term" style="top:100px; left:100px;">
    <div class="title">
      Terminal
      <span onclick="closeWin()">X</span>
    </div>

    <div class="terminal" id="output"></div>

    <input class="cmd" id="cmd" autofocus>
  </div>

  <div class="taskbar">Seven OS - conectado</div>

</div>

<script>

// LOGIN
document.getElementById("pass").addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    document.getElementById("login").style.display="none";
    document.getElementById("desktop").style.display="block";
  }
});

// abrir
function openWin(){
  term.style.display="flex";
}

// fechar
function closeWin(){
  term.style.display="none";
}

// TERMINAL
let output = document.getElementById("output");
let input = document.getElementById("cmd");

input.addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    let cmd = input.value;
    output.innerHTML += "<div>> "+cmd+"</div>";

    if(cmd==="help"){
      output.innerHTML += "comandos: help, clear, about<br>";
    }
    else if(cmd==="clear"){
      output.innerHTML="";
    }
    else if(cmd==="about"){
      output.innerHTML += "Seven OS v1<br>";
    }
    else{
      output.innerHTML += "comando não reconhecido<br>";
    }

    input.value="";
    output.scrollTop = output.scrollHeight;
  }
});

// arrastar
let win = document.getElementById("term");
let bar = win.querySelector(".title");
let is=false,x,y;

bar.onmousedown=e=>{
  is=true;
  x=e.clientX-win.offsetLeft;
  y=e.clientY-win.offsetTop;
};

document.onmouseup=()=>is=false;

document.onmousemove=e=>{
  if(is){
    win.style.left=e.clientX-x+"px";
    win.style.top=e.clientY-y+"px";
  }
};
</script>

</body>
</html>
