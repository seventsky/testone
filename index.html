<script>

/* ================= CORE ================= */

let Z=1;
let APP_REGISTRY={};
let ACTIVE_APP=null;

/* ================= CLOCK ================= */

setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* ================= LOGIN ================= */

function boot(){
login.style.display="none";
init();
}

/* ================= WINDOW ENGINE ================= */

function createWindow(app){

let w=document.createElement("div");
w.className="window";
w.id=app.id;

w.style.left=(window.innerWidth/2-240)+"px";
w.style.top=(window.innerHeight/2-160)+"px";

w.innerHTML=`
<div class="titlebar">
${app.title}
<div>
<span onclick="min('${app.id}')">—</span>
<span onclick="closeW('${app.id}')">✕</span>
</div>
</div>

<div class="content">${app.content}</div>
`;

document.body.appendChild(w);
drag(w);
}

/* ================= ICON SYSTEM ================= */

function createIcon(app){
let d=document.createElement("div");
d.className="icon";

d.innerHTML=`
<span>${app.icon}</span>
<div style="font-size:12px;margin-top:5px">${app.title}</div>
`;

d.onclick=()=>openApp(app.id);
desktop.appendChild(d);
}

/* ================= APP REGISTRY ================= */

function registerApp(app){
APP_REGISTRY[app.id]=app;
}

/* ================= OPEN / CLOSE ================= */

function openApp(id){
let w=document.getElementById(id);
if(!w) return;
w.style.display="flex";
focus(w);
setActiveTask(id);
}

function min(id){
let w=document.getElementById(id);
if(w) w.style.display="none";
}

function closeW(id){min(id);}

/* ================= TASKBAR (IMPROVED) ================= */

function buildTaskbar(){
let t=document.getElementById("tasks");

Object.keys(APP_REGISTRY).forEach(id=>{
let b=document.createElement("div");
b.className="task";
b.innerText=APP_REGISTRY[id].icon;

b.onclick=()=>openApp(id);

t.appendChild(b);
});
}

function setActiveTask(id){
document.querySelectorAll(".task").forEach(t=>t.classList.remove("active"));
ACTIVE_APP=id;
}

/* ================= FOCUS ================= */

function focus(w){
Z++;
w.style.zIndex=Z;
}

/* ================= DRAG ================= */

function drag(win){
let bar=win.querySelector(".titlebar");
let active=false,x=0,y=0;

bar.onmousedown=e=>{
active=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(active){
win.style.left=e.clientX-x+"px";
win.style.top=e.clientY-y+"px";
}
};

document.onmouseup=()=>active=false;
}

/* ================= ENCODING SYSTEM (SEGREDOS) ================= */

function encodeText(text){
return btoa(unescape(encodeURIComponent(text)));
}

function decodeText(text){
try{
return decodeURIComponent(escape(atob(text)));
}catch(e){
return "erro na decodificação";
}
}

/* ================= FILES (INTERATIVO REAL) ================= */

let FILES=[
{ name:"memory.log", content:"system active" },
{ name:"core.dat", content:"constelação layer" }
];

function openFile(name){
let file=FILES.find(f=>f.name===name);
if(!file) return;

openApp("files_view");

document.getElementById("fileContent").value=file.content;
}

/* ================= INIT ================= */

function init(){

buildTaskbar();

/* ================= FILES ================= */

registerApp({
id:"files",
title:"files.exe",
icon:"📁",
content:`
<h3>📁 system files</h3>

<div id="fileList">
${FILES.map(f=>`<div onclick="openFile('${f.name}')">📄 ${f.name}</div>`).join("")}
</div>

<hr>

<textarea id="fileContent"></textarea>

<div class="preview">click file to open</div>
`
});

/* hidden viewer */
registerApp({
id:"files_view",
title:"file.viewer",
icon:"📄",
content:`<textarea id="fileContent"></textarea>`
});

/* ================= NOTES ================= */

registerApp({
id:"notes",
title:"notes.exe",
icon:"📝",
content:`<textarea></textarea>`
});

/* ================= SEGREDOS (TROCA DO TODO) ================= */

registerApp({
id:"secrets",
title:"secrets.exe",
icon:"🔐",
content:`
<h3>🔐 SOMENTE EM CRIPTOGRAFIA</h3>
<p>use decode para ler mensagens</p>

<textarea id="secretInput"></textarea>

<button onclick="encrypt()">encode</button>
<button onclick="decrypt()">decode</button>

<div id="secretOutput" class="preview"></div>
`
});

/* ================= MUSIC ================= */

registerApp({
id:"music",
title:"music.exe",
icon:"🎧",
content:`forfun<br>xamã<br>mac miller<br>mgk<br>sleep token`
});

/* ================= PLAYLIST ================= */

registerApp({
id:"playlist",
title:"playlist.exe",
icon:"🎵",
content:`
<iframe width="100%" height="180"
src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>
`
});

/* ================= GAME ================= */

registerApp({
id:"game",
title:"game.exe",
icon:"🎮",
content:`
<h3>click system</h3>
<button onclick="addScore()">CLICK</button>
<div id="score">0</div>
`
});

/* ================= SEARCH ================= */

registerApp({
id:"search",
title:"search.exe",
icon:"🔍",
content:`<input placeholder="search system">`
});

/* ================= SETTINGS ================= */

registerApp({
id:"settings",
title:"settings.exe",
icon:"⚙",
content:`
<button onclick="document.body.style.background='#000'">dark</button>
<button onclick="document.body.style.background='#111'">gray</button>
`
});

/* ================= BUILD SYSTEM ================= */

Object.values(APP_REGISTRY).forEach(app=>{
createWindow(app);
createIcon(app);
});

}

/* ================= SEGREDOS LOGIC ================= */

function encrypt(){
let t=document.getElementById("secretInput").value;
document.getElementById("secretOutput").innerText=encodeText(t);
}

function decrypt(){
let t=document.getElementById("secretInput").value;
document.getElementById("secretOutput").innerText=decodeText(t);
}

/* ================= GAME ================= */

let score=0;
function addScore(){
score++;
document.getElementById("score").innerText=score;
}

</script>
