<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v39.2 </title>

<style>
body{
margin:0;
font-family:Segoe UI, monospace;
background:#000;
color:#d1d5db;
overflow:hidden;
}

/* ===== GLITCH ===== */
@keyframes glitch{
0%{transform:translate(0)}
25%{transform:translate(-2px,2px)}
50%{transform:translate(2px,-2px)}
75%{transform:translate(-1px,1px)}
100%{transform:translate(0)}
}
.glitch{
animation:glitch 0.2s infinite;
}

/* ===== TELA QUEBRADA (mantida) ===== */
body::after{
content:"";
position:fixed;
inset:0;
background:url('https://i.imgur.com/8yKQF5R.png');
opacity:0.08;
pointer-events:none;
}

/* LOGIN */
#login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
font-size:22px;
cursor:pointer;
z-index:99999;
}

/* DESKTOP */
#desktop{
position:absolute;
inset:0 0 48px 0;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:14px;
padding:20px;
}

/* ICONS */
.icon{
width:80px;
height:80px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.icon:hover{
background:rgba(0,255,150,0.08);
transform:scale(1.05);
}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:48px;
background:linear-gradient(to top,#0a0f14,#111827);
display:flex;
align-items:center;
padding:0 10px;
border-top:1px solid rgba(255,255,255,0.05);
}

.start{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
cursor:pointer;
}

.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
background:#111;
border-radius:6px;
cursor:pointer;
font-size:18px;
transition:.2s;
}

.task:hover{
background:#1a1f27;
transform:scale(1.1);
}

.task.active{
background:rgba(0,255,150,0.2);
}

#clock{
margin-left:auto;
}

/* WINDOWS */
.window{
position:absolute;
width:520px;
height:340px;
background:#0b0f14;
border:1px solid #00ff9f33;
border-radius:10px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
}

.titlebar{
background:#111;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
}

.content{
flex:1;
padding:10px;
overflow:auto;
}

button,input,textarea{
background:#000;
color:#00ff9f;
border:none;
padding:6px;
width:100%;
margin-bottom:5px;
}

/* ===== WIDGET ANIMADO ===== */
#widget-note{
position:fixed;
right:20px;
bottom:-120px;
background:#0b0f14;
border:1px solid #00ff9f33;
padding:10px;
font-size:12px;
width:180px;
border-radius:8px;
opacity:0;
transition:all .4s ease;
box-shadow:0 0 15px rgba(0,255,150,0.2);
}

#widget-note.show{
bottom:80px;
opacity:1;
}
</style>
</head>

<body>

<div id="login" onclick="boot()">✧₊⁺ constelação</div>

<div id="desktop"></div>

<div id="widget-note">alguém está vendo...</div>

<div class="taskbar">
<div class="start">🐦</div>
<div class="tasks" id="tasks"></div>
<div id="clock"></div>
</div>

<script>

/* CORE */
let Z=1;
let APP_REGISTRY={};
let FILES=[];
let TASKS={};

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* LOGIN */
function boot(){
login.style.display="none";
init();
}

/* WINDOW */
function createWindow(app){
let w=document.createElement("div");
w.className="window";
w.id=app.id;

w.style.left="200px";
w.style.top="120px";

w.innerHTML=`
<div class="titlebar">
${app.title}
<div>
<span onclick="min('${app.id}')">—</span>
<span onclick="closeW('${app.id}')">✕</span>
</div>
</div>
<div class="content">${app.content}</div>
`;

document.body.appendChild(w);
drag(w);
}

/* ICON */
function createIcon(app){
let d=document.createElement("div");
d.className="icon";

d.innerHTML=`
<span style="font-size:26px">${app.icon}</span>
<div style="font-size:11px">${app.title}</div>
`;

d.onclick=()=>openApp(app.id);
desktop.appendChild(d);
}

/* TASKBAR */
function addTask(app){
if(TASKS[app.id]) return;

let t=document.createElement("div");
t.className="task";
t.innerText=app.icon;

t.onclick=()=>openApp(app.id);

tasks.appendChild(t);
TASKS[app.id]=t;
}

/* OPEN */
function openApp(id){
let w=document.getElementById(id);
if(!w) return;

w.style.display="flex";
focus(w);

addTask(APP_REGISTRY[id]);

Object.values(TASKS).forEach(t=>t.classList.remove("active"));
TASKS[id].classList.add("active");

document.body.classList.add("glitch");
setTimeout(()=>document.body.classList.remove("glitch"),150);
}

/* MIN */
function min(id){
document.getElementById(id).style.display="none";
if(TASKS[id]) TASKS[id].classList.remove("active");
}

function closeW(id){min(id);}

/* FOCUS */
function focus(w){
Z++;
w.style.zIndex=Z;
}

/* DRAG */
function drag(win){
let bar=win.querySelector(".titlebar");
let active=false,x=0,y=0;

bar.onmousedown=e=>{
active=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(active){
win.style.left=(e.clientX-x)+"px";
win.style.top=(e.clientY-y)+"px";
}
};

document.onmouseup=()=>active=false;
}

/* INIT */
function init(){

FILES=[
{name:"talvez a verdadeira.log",content:"system active"},
{name:"melodia seja.dat",content:"constelação layer"},
{name:"a conversa.sys",content:"locked profile"},
{name:"entre as estrelas.sec",content:"secure boot active"}
];

/* APPS */
registerApp({
id:"files",
title:"files.exe",
icon:"📁",
content:`<h3>FILES SYSTEM</h3>
${FILES.map(f=>`<div onclick="openFile('${f.name}')">📄 ${f.name}</div>`).join("")}
<textarea id="fileView"></textarea>`
});

registerApp({id:"notes",title:"notes.exe",icon:"📝",content:`<textarea></textarea>`});

registerApp({
id:"secrets",
title:"secrets.exe",
icon:"🔐",
content:`<textarea id="sec"></textarea>
<button onclick="out.innerText=encode(sec.value)">encode</button>
<button onclick="out.innerText=decode(sec.value)">decode</button>
<div id="out"></div>`
});

registerApp({id:"playlist",title:"playlist.exe",icon:"🎧",content:`forfun<br>xamã<br>mac miller<br>MGK<br>sleeptoken<br>kehlani`});

registerApp({id:"music",title:"music.exe",icon:"🎵",content:`<iframe width="100%" height="180" src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>`});

registerApp({id:"game",title:"game.exe",icon:"🎮",content:`<button onclick="add()">click</button><div id="g">0</div>`});

registerApp({id:"search",title:"search.exe",icon:"🔍",content:`<input placeholder="search system">`});

registerApp({id:"settings",title:"settings.exe",icon:"⚙",content:`<button onclick="document.body.style.background='#000'">dark</button>`});

/* BUILD */
Object.values(APP_REGISTRY).forEach(app=>{
createWindow(app);
createIcon(app);
});

/* 🔥 MENSAGEM INICIAL */
setTimeout(()=>{
showMessage("alguém está vendo...");
},5000);

/* 🔥 LOOP DE MENSAGENS */
setInterval(()=>{
let msgs=[
"você abriu algo que não devia",
"eu ainda estou aqui",
"isso não é seu computador",
"pare de procurar",
"você viu demais"
];

let msg=msgs[Math.floor(Math.random()*msgs.length)];
showMessage(msg);

},20000);

}

/* NOTIFICAÇÃO */
function showMessage(text){
let w=document.getElementById("widget-note");

w.innerText=text;
w.classList.add("show");

document.body.classList.add("glitch");

setTimeout(()=>{
document.body.classList.remove("glitch");
},200);

setTimeout(()=>{
w.classList.remove("show");
},4000);
}

/* SYSTEM */
function registerApp(app){
APP_REGISTRY[app.id]=app;
}

/* GAME */
let c=0;
function add(){
c++;
document.getElementById("g").innerText=c;
}

/* CRYPTO */
function encode(t){return btoa(unescape(encodeURIComponent(t)))}
function decode(t){try{return decodeURIComponent(escape(atob(t)))}catch(e){return "erro"}}

</script>

</body>
</html>
