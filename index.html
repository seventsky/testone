<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v14.5</title>

<style>
:root{
--bg:#05070a;
--bg2:#0f1722;
--text:#d1d5db;
--panel:#111;
--accent:#00ff9f;
}

.light{
--bg:#e5e7eb;
--bg2:#ffffff;
--text:#111;
--panel:#f3f4f6;
--accent:#0ea5e9;
}

body{
margin:0;
font-family:"Segoe UI", monospace;
background:radial-gradient(circle at top,var(--bg2),var(--bg));
color:var(--text);
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
background:radial-gradient(circle,#05070a,#000);
z-index:9999;
}

#clockLogin{
position:absolute;
top:40px;
font-size:40px;
opacity:0.8;
}

.user{
cursor:pointer;
padding:25px;
border-radius:12px;
transition:.3s;
text-align:center;
}

.user:hover{
background:rgba(0,255,150,0.1);
transform:scale(1.05);
}

.user span{display:block;margin-top:10px}

/* DESKTOP */
.desktop{
height:calc(100vh - 48px);
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:14px;
}

/* ICON */
.icon{
text-align:center;
padding:6px;
cursor:pointer;
border-radius:6px;
}
.icon:hover{background:rgba(255,255,255,0.05)}

/* TASKBAR */
.taskbar{
height:48px;
background:var(--panel);
display:flex;
align-items:center;
padding:0 10px;
position:fixed;
bottom:0;width:100%;
}

.apps{display:flex;gap:8px;margin-left:10px}
.task{padding:6px;cursor:pointer}
.clock{margin-left:auto;font-size:12px}

/* WINDOW */
.window{
position:absolute;
width:520px;height:360px;
background:var(--panel);
border:1px solid rgba(0,255,150,0.2);
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
border-radius:8px;
}

.titlebar{
background:#000;
padding:6px;
cursor:move;
display:flex;
justify-content:space-between;
}

.content{flex:1;padding:10px;overflow:auto}

/* FILE */
.file{
padding:6px;
background:rgba(0,0,0,0.4);
margin-bottom:6px;
cursor:pointer;
}

/* EDITOR */
textarea{
width:100%;
height:100%;
background:black;
color:var(--accent);
border:none;
outline:none;
}

/* SETTINGS */
.setting{
padding:10px;
background:rgba(0,0,0,0.4);
cursor:pointer;
margin-bottom:10px;
}

/* MUSIC */
.artist{
padding:8px;
background:rgba(0,0,0,0.4);
margin-bottom:6px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div id="clockLogin"></div>

<div class="user" onclick="enter()">
🌌
<span>constelação</span>
</div>
</div>

<!-- DESKTOP -->
<div class="desktop" id="desktop"></div>

<!-- TASKBAR -->
<div class="taskbar">
<div class="apps" id="apps"></div>
<div class="clock" id="clock"></div>
</div>

<script>

/* CLOCK */
setInterval(()=>{
let t=new Date()
clock.innerText=t.toLocaleTimeString().slice(0,5)
clockLogin.innerText=t.toLocaleTimeString().slice(0,5)
},1000)

/* LOGIN */
function enter(){
login.style.opacity=0
setTimeout(()=>{
login.style.display="none"
init()
},400)
}

/* THEME */
function setTheme(mode){
document.body.classList.toggle("light",mode==="light")
localStorage.setItem("theme",mode)
}

(function(){
let saved=localStorage.getItem("theme")
if(saved) setTheme(saved)
})()

/* WINDOW SYSTEM */
function openApp(id){
let w=document.getElementById(id)
w.style.display="flex"
focus(w)
}

function focus(w){
document.querySelectorAll(".window").forEach(x=>x.style.zIndex=1)
w.style.zIndex=999
}

/* DRAG */
document.addEventListener("mousedown",e=>{
if(e.target.classList.contains("titlebar")){
let win=e.target.parentElement
let x=e.clientX-win.offsetLeft
let y=e.clientY-win.offsetTop

function move(e){
win.style.left=e.clientX-x+"px"
win.style.top=e.clientY-y+"px"
}

document.addEventListener("mousemove",move)
document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true})
}
})

/* ICON */
function createIcon(name,app){
let d=document.createElement("div")
d.className="icon"
d.innerHTML=name
d.ondblclick=()=>openApp(app)
desktop.appendChild(d)
}

/* WINDOW */
function createWindow(id,title,html){
let w=document.createElement("div")
w.className="window"
w.id=id

w.innerHTML=`
<div class="titlebar">${title}</div>
<div class="content">${html}</div>`

document.body.appendChild(w)
}

/* INIT */
function init(){

createIcon("📰<br>log","files")
createIcon("📝<br>notes","editor")
createIcon("⌨<br>terminal","terminal")
createIcon("🎧<br>youtube","music")
createIcon("⚙️<br>settings","settings")

createWindow("files","files.exe","<div class='file'>📄 fragmento.txt</div>")

createWindow("editor","notes.exe","<textarea>escreva aqui...</textarea>")

createWindow("terminal","terminal.exe","<div>> ready</div>")

createWindow("music","youtube.exe",`
<div class="artist">🎧 forfun</div>
<div class="artist">🌑 xamã</div>
<div class="artist">☁ mac miller</div>
<div class="artist">⚡ mgk</div>
<div class="artist">🩸 sleep token</div>
`)

createWindow("settings","settings.exe",`
<div class="setting" onclick="setTheme('dark')">🌑 tema escuro</div>
<div class="setting" onclick="setTheme('light')">☀️ tema claro</div>
`)

}

</script>

</body>
</html>
