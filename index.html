<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v31.5</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background:#0e1116;
color:#d1d5db;
overflow:hidden;
}

/* DESKTOP */
#desktop{
position:absolute;
inset:0 0 48px 0;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:12px;
padding:20px;
}

.icon{
width:80px;
height:80px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
border-radius:6px;
cursor:pointer;
font-size:12px;
}
.icon:hover{
background:rgba(255,255,255,0.06);
}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:48px;
background:#181c22;
display:flex;
align-items:center;
padding:0 10px;
border-top:1px solid #2a2f36;
}

.start{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
background:#232830;
border-radius:4px;
cursor:pointer;
}

.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 10px;
border-radius:4px;
cursor:pointer;
background:#232830;
border:1px solid #2f343b;
font-size:12px;
}

.task.active{
background:#3a3f46;
}

#clock{
margin-left:auto;
font-size:12px;
color:#aaa;
}

/* WINDOW */
.window{
position:absolute;
width:520px;
height:340px;
background:#1f2329;
border:1px solid #2f343b;
border-radius:6px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
}

.titlebar{
background:#2a2f36;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
}

.content{
flex:1;
padding:10px;
overflow:auto;
}

button,input,textarea{
background:#111;
color:#ddd;
border:1px solid #333;
padding:6px;
width:100%;
margin-bottom:5px;
}
</style>
</head>

<body>

<div id="login">✧₊⁺ constelação</div>
<div id="desktop"></div>

<div class="taskbar">
<div class="start">◼</div>
<div class="tasks" id="tasks"></div>
<div id="clock"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const desktop = document.getElementById("desktop");
const tasks = document.getElementById("tasks");
const clock = document.getElementById("clock");
const login = document.getElementById("login");

let Z=1;
let APP_REGISTRY={};
let FILES=[];

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* LOGIN */
login.onclick = ()=>{
login.style.display="none";
init();
};

/* WINDOW */
function createWindow(app){
let w=document.createElement("div");
w.className="window";
w.id=app.id;

w.style.left="200px";
w.style.top="120px";

w.innerHTML=`
<div class="titlebar">
${app.title}
<div>
<span onclick="min('${app.id}')">—</span>
<span onclick="closeW('${app.id}')">✕</span>
</div>
</div>
<div class="content">${app.content}</div>
`;

document.body.appendChild(w);
drag(w);
}

/* ICON */
function createIcon(app){
let d=document.createElement("div");
d.className="icon";

d.innerHTML=`
<div style="font-size:26px">${app.icon}</div>
<div>${app.title}</div>
`;

d.onclick=()=>openApp(app.id);
desktop.appendChild(d);
}

/* TASK */
function addTask(app){
let t=document.createElement("div");
t.className="task";
t.innerText=app.title;
t.onclick=()=>openApp(app.id);
tasks.appendChild(t);
}

/* SYSTEM */
function registerApp(app){
APP_REGISTRY[app.id]=app;
}

/* OPEN */
function openApp(id){
let w=document.getElementById(id);
if(!w) return;

w.style.display="flex";
focus(w);
addTask(APP_REGISTRY[id]);
}

/* MIN */
function min(id){
document.getElementById(id).style.display="none";
}
function closeW(id){min(id);}

/* FOCUS */
function focus(w){
Z++;
w.style.zIndex=Z;
}

/* DRAG */
function drag(win){
let bar=win.querySelector(".titlebar");
let active=false,x=0,y=0;

bar.onmousedown=e=>{
active=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(active){
win.style.left=(e.clientX-x)+"px";
win.style.top=(e.clientY-y)+"px";
}
};

document.onmouseup=()=>active=false;
}

/* ===== FUNÇÕES ORIGINAIS RESTAURADAS ===== */

function upgradeTaskbar(){
document.querySelectorAll(".task").forEach(t=>{
t.style.transition=".2s";
t.onmouseenter=()=>t.style.transform="scale(1.1)";
t.onmouseleave=()=>t.style.transform="scale(1)";
});
}

function upgradeFiles(){
let items=document.querySelectorAll("#files .content div");
items.forEach(item=>{
item.onclick=()=>{
items.forEach(i=>i.style.background="transparent");
item.style.background="#333";
};
});
}

function searchHack(){
let input=document.querySelector("#search input");
if(!input) return;

input.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
document.querySelector("#search .content").innerHTML=`
<div style="text-align:center">
<h2>SISTEMA INVADIDO</h2>
<p>${input.value}</p>
</div>`;
}
});
}

/* INIT */
function init(){

FILES=[
{name:"talvez a verdadeira.log",content:"system active"},
{name:"melodia seja.dat",content:"constelação layer"},
{name:"a conversa.sys",content:"locked profile"},
{name:"entre as estrelas.sec",content:"secure boot active"}
];

/* TODOS OS APPS ORIGINAIS */
registerApp({
id:"files",
title:"files.exe",
icon:"📁",
content:`<h3>FILES</h3>
${FILES.map(f=>`<div>📄 ${f.name}</div>`).join("")}
<textarea></textarea>`
});

registerApp({
id:"notes",
title:"notes.exe",
icon:"📝",
content:`<textarea></textarea>`
});

registerApp({
id:"secrets",
title:"secrets.exe",
icon:"🔐",
content:`<textarea></textarea>`
});

registerApp({
id:"playlist",
title:"playlist.exe",
icon:"🎧",
content:`forfun<br>xamã<br>mac miller<br>MGK<br>sleeptoken<br>kehlani`
});

registerApp({
id:"music",
title:"music.exe",
icon:"🎵",
content:`<iframe width="100%" height="180"
src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>`
});

registerApp({
id:"game",
title:"game.exe",
icon:"🎮",
content:`<button onclick="add()">click</button><div id="g">0</div>`
});

registerApp({
id:"search",
title:"search.exe",
icon:"🔍",
content:`<input placeholder="search system">`
});

registerApp({
id:"settings",
title:"settings.exe",
icon:"⚙",
content:`<button onclick="document.body.style.background='#000'">dark</button>`
});

/* BUILD */
Object.values(APP_REGISTRY).forEach(app=>{
createWindow(app);
createIcon(app);
});

/* RESTAURA FUNÇÕES */
setTimeout(()=>{
upgradeTaskbar();
upgradeFiles();
searchHack();
},300);
}

/* GAME */
window.add=()=>{
let g=document.getElementById("g");
g.innerText=parseInt(g.innerText)+1;
};

});
</script>

</body>
</html>
