<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v16</title>

<style>
:root{
--bg:#05070a;
--panel:#0b0f14;
--text:#d1d5db;
--accent:#00ff9f;
--blur:blur(10px);
}

body{
margin:0;
font-family:"Segoe UI", monospace;
background:radial-gradient(circle at top,#0f1722,#05070a);
color:var(--text);
overflow:hidden;
}

/* DESKTOP */
.desktop{
height:calc(100vh - 50px);
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:14px;
}

/* ICON */
.icon{
text-align:center;
cursor:pointer;
padding:6px;
border-radius:8px;
transition:.2s;
}
.icon:hover{background:rgba(255,255,255,0.05)}

/* TASKBAR */
.taskbar{
height:50px;
background:rgba(10,15,20,0.7);
backdrop-filter:var(--blur);
display:flex;
align-items:center;
padding:0 10px;
position:fixed;
bottom:0;width:100%;
}

.task{
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}
.task.active{background:rgba(0,255,150,0.2)}

.clock{margin-left:auto}

/* WINDOW */
.window{
position:absolute;
width:520px;height:360px;
background:var(--panel);
border:1px solid rgba(0,255,150,0.15);
border-radius:10px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
opacity:0;
transition:.2s;
}

.titlebar{
background:#111;
padding:8px;
cursor:move;
}

/* CONTENT */
.content{flex:1;padding:10px;overflow:auto}

/* INPUT */
input,textarea{
width:100%;
background:#000;
color:var(--accent);
border:none;
padding:6px;
outline:none;
}

/* TODO */
.todo-item{
padding:6px;
margin-bottom:6px;
background:#111;
cursor:pointer;
}
.done{opacity:0.4;text-decoration:line-through}
</style>
</head>

<body>

<div class="desktop" id="desktop"></div>

<div class="taskbar" id="taskbar">
<div id="tasks"></div>
<div class="clock" id="clock"></div>
</div>

<script>

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5)
},1000)

/* SYSTEM */
let z=1

function focus(w){z++;w.style.zIndex=z}

function openApp(id){
let w=document.getElementById(id)
w.style.display="flex"
requestAnimationFrame(()=>w.style.opacity=1)
focus(w)
createTask(id)
setActive(id,true)
}

function minimize(id){
let w=document.getElementById(id)
w.style.opacity=0
setTimeout(()=>w.style.display="none",200)
setActive(id,false)
}

/* TASKBAR */
function createTask(id){
if(document.getElementById("task-"+id)) return
let t=document.createElement("div")
t.className="task"
t.id="task-"+id
t.innerText=id
t.onclick=()=>toggle(id)
tasks.appendChild(t)
}

function toggle(id){
let w=document.getElementById(id)
if(w.style.display==="none") openApp(id)
else minimize(id)
}

function setActive(id,state){
let t=document.getElementById("task-"+id)
if(t) t.classList.toggle("active",state)
}

/* DRAG */
function drag(win){
let bar=win.querySelector(".titlebar")
let is=false,x,y

bar.onmousedown=e=>{
is=true
x=e.clientX-win.offsetLeft
y=e.clientY-win.offsetTop
focus(win)
}

document.onmousemove=e=>{
if(is){
win.style.left=e.clientX-x+"px"
win.style.top=e.clientY-y+"px"
}
}

document.onmouseup=()=>is=false
}

/* CREATE WINDOW */
function createWindow(id,title,html){
let w=document.createElement("div")
w.className="window"
w.id=id

w.innerHTML=`
<div class="titlebar">${title}</div>
<div class="content">${html}</div>`

document.body.appendChild(w)
drag(w)
}

/* ICON */
function icon(name,id){
let d=document.createElement("div")
d.className="icon"
d.innerHTML=name
d.ondblclick=()=>openApp(id)
desktop.appendChild(d)
}

/* ================= APPS ================= */

/* NET */
function renderNet(page="home",q=""){
let html=""

if(page==="home"){
html=`
<h3>home</h3>
<div onclick="renderNet('music')">🎧 music</div>
<div onclick="renderNet('notes')">📝 notes</div>
`
}

if(page==="music"){
html=`
<h3>music</h3>
<div>🎧 forfun</div>
<div>🌑 xamã</div>
<div>☁ mac miller</div>
`
}

if(page==="search"){
html=`<h3>search: ${q}</h3>
<div>resultado interno...</div>`
}

netContent.innerHTML=`
<input placeholder="search..." onkeydown="if(event.key==='Enter')renderNet('search',this.value)">
${html}`
}

/* NOTES */
function addNote(){
let val=noteInput.value
if(!val) return
let notes=JSON.parse(localStorage.getItem("notes")||"[]")
notes.push(val)
localStorage.setItem("notes",JSON.stringify(notes))
renderNotes()
noteInput.value=""
}

function renderNotes(){
let notes=JSON.parse(localStorage.getItem("notes")||"[]")
notesList.innerHTML=""
notes.forEach(n=>{
let d=document.createElement("div")
d.className="todo-item"
d.innerText=n
notesList.appendChild(d)
})
}

/* TODO */
function addTodo(){
let val=todoInput.value
if(!val) return
let todos=JSON.parse(localStorage.getItem("todos")||"[]")
todos.push({text:val,done:false})
localStorage.setItem("todos",JSON.stringify(todos))
renderTodo()
todoInput.value=""
}

function renderTodo(){
let todos=JSON.parse(localStorage.getItem("todos")||"[]")
todoList.innerHTML=""
todos.forEach((t,i)=>{
let d=document.createElement("div")
d.className="todo-item "+(t.done?"done":"")
d.innerText=t.text
d.onclick=()=>{
t.done=!t.done
localStorage.setItem("todos",JSON.stringify(todos))
renderTodo()
}
todoList.appendChild(d)
})
}

/* INIT */
function init(){

icon("🌐<br>net","net")
icon("📝<br>notes","notes")
icon("📋<br>todo","todo")

createWindow("net","net.exe","<div id='netContent'></div>")
createWindow("notes","notes.exe","<input id='noteInput'><button onclick='addNote()'>add</button><div id='notesList'></div>")
createWindow("todo","todo.exe","<input id='todoInput'><button onclick='addTodo()'>add</button><div id='todoList'></div>")

renderNet()
renderNotes()
renderTodo()

}

init()

</script>

</body>
</html>
