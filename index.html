<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v24.3</title>

<style>
body{
margin:0;
font-family:Segoe UI, monospace;
background:#000;
color:#d1d5db;
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#000;
font-size:22px;
cursor:pointer;
z-index:99999;
}

/* DESKTOP */
#desktop{
position:absolute;
inset:0 0 48px 0;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:14px;
padding:20px;
align-content:start;
}

/* ICONS */
.icon{
width:80px;
height:80px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
border-radius:10px;
cursor:pointer;
transition:.2s;
user-select:none;
}

.icon:hover{
background:rgba(0,255,150,0.08);
transform:scale(1.05);
}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:48px;
background:#0a0f14;
display:flex;
align-items:center;
padding:0 10px;
}

.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 10px;
border-radius:6px;
cursor:pointer;
background:#111;
}

.task.active{
background:#00ff9f33;
}

#clock{
margin-left:auto;
}

/* WINDOW */
.window{
position:absolute;
width:480px;
height:320px;
background:#0b0f14;
border:1px solid #00ff9f33;
border-radius:10px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
}

.titlebar{
background:#111;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
}

.content{
flex:1;
padding:10px;
overflow:auto;
}

button,input,textarea{
background:#000;
color:#00ff9f;
border:none;
padding:6px;
width:100%;
margin-bottom:5px;
}

/* WIDGETS */
.widget{
position:absolute;
top:20px;
right:20px;
width:180px;
padding:10px;
background:#0b0f14;
border:1px solid #00ff9f33;
border-radius:10px;
font-size:12px;
}
</style>
</head>

<body>

<div id="login" onclick="boot()">🌌 constelação</div>

<div id="desktop"></div>

<div class="widget" id="widget">
⏱ system online<br>
📡 constelação OS<br>
🔐 secure layer active
</div>

<div class="taskbar">
<div>◼</div>
<div class="tasks" id="tasks"></div>
<div id="clock"></div>
</div>

<script>

/* ================= CORE ================= */

let Z=1;
let APP_REGISTRY={};
let ACTIVE=null;

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* LOGIN */
function boot(){
login.style.display="none";
init();
}

/* ================= WINDOW ================= */

function createWindow(app){

let w=document.createElement("div");
w.className="window";
w.id=app.id;

w.style.left=(window.innerWidth/2-240)+"px";
w.style.top=(window.innerHeight/2-160)+"px";

w.innerHTML=`
<div class="titlebar">
${app.title}
<div>
<span onclick="min('${app.id}')">—</span>
<span onclick="closeW('${app.id}')">✕</span>
</div>
</div>
<div class="content">${app.content}</div>
`;

document.body.appendChild(w);
drag(w);
}

/* ================= ICONS ================= */

function createIcon(app){
let d=document.createElement("div");
d.className="icon";

d.innerHTML=`
<span style="font-size:26px">${app.icon}</span>
<div style="font-size:11px">${app.title}</div>
`;

d.onclick=()=>openApp(app.id);
desktop.appendChild(d);
}

/* ================= SYSTEM ================= */

function registerApp(app){
APP_REGISTRY[app.id]=app;
}

/* ================= OPEN ================= */

function openApp(id){
let w=document.getElementById(id);
if(!w) return;
w.style.display="flex";
focus(w);
setActive(id);
}

function min(id){
document.getElementById(id).style.display="none";
}

function closeW(id){min(id);}

/* ================= FOCUS ================= */

function focus(w){
Z++;
w.style.zIndex=Z;
}

function setActive(id){
document.querySelectorAll(".task").forEach(t=>t.classList.remove("active"));
}

/* ================= DRAG ================= */

function drag(win){
let bar=win.querySelector(".titlebar");
let a=false,x=0,y=0;

bar.onmousedown=e=>{
a=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(a){
win.style.left=e.clientX-x+"px";
win.style.top=e.clientY-y+"px";
}
};

document.onmouseup=()=>a=false;
}

/* ================= TASKBAR ================= */

function buildTaskbar(){
let t=document.getElementById("tasks");

Object.values(APP_REGISTRY).forEach(app=>{
let b=document.createElement("div");
b.className="task";
b.innerText=app.icon;
b.onclick=()=>openApp(app.id);
t.appendChild(b);
});
}

/* ================= NOTES SYSTEM ================= */

function autoSaveNotes(){
let n=document.querySelector("#notesArea");
if(n){
localStorage.setItem("notes",n.value);
}
}

/* ================= FILE SYSTEM ================= */

let FILES=[
{name:"memory.log",content:"system online"},
{name:"core.dat",content:"constelação layer active"},
{name:"user.sys",content:"profile locked"}
];

function openFile(name){
let f=FILES.find(x=>x.name===name);
if(!f) return;

let el=document.getElementById("fileView");
if(el) el.value=f.content;
}

/* ================= CRYPTO ================= */

function encode(t){return btoa(unescape(encodeURIComponent(t)))}
function decode(t){try{return decodeURIComponent(escape(atob(t)))}catch(e){return "error"}}

/* ================= INIT ================= */

function init(){

buildTaskbar();

/* FILES */
registerApp({
id:"files",
title:"files.exe",
icon:"📁",
content:`
<h3>FILES</h3>
${FILES.map(f=>`<div onclick="openFile('${f.name}')">📄 ${f.name}</div>`).join("")}
<textarea id="fileView"></textarea>
`
});

/* NOTES */
registerApp({
id:"notes",
title:"notes.exe",
icon:"📝",
content:`<textarea id="notesArea" oninput="autoSaveNotes()"></textarea>`
});

/* SECRETS */
registerApp({
id:"secrets",
title:"secrets.exe",
icon:"🔐",
content:`
<h3>somente em criptografia</h3>
<textarea id="sec"></textarea>
<button onclick="out.innerText=encode(sec.value)">encode</button>
<button onclick="out.innerText=decode(sec.value)">decode</button>
<div id="out"></div>
`
});

/* MUSIC */
registerApp({
id:"music",
title:"music.exe",
icon:"🎧",
content:`forfun<br>xamã<br>mac miller<br>mgk<br>sleep token`
});

/* PLAYLIST */
registerApp({
id:"playlist",
title:"playlist.exe",
icon:"🎵",
content:`<iframe width="100%" height="180"
src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>`
});

/* GAME */
registerApp({
id:"game",
title:"game.exe",
icon:"🎮",
content:`<button onclick="add()">click</button><div id="g">0</div>`
});

/* SEARCH */
registerApp({
id:"search",
title:"search.exe",
icon:"🔍",
content:`<input placeholder="search system">`
});

/* SETTINGS */
registerApp({
id:"settings",
title:"settings.exe",
icon:"⚙",
content:`<button onclick="document.body.style.background='#000'">dark</button>`
});

/* BUILD */
Object.values(APP_REGISTRY).forEach(app=>{
createWindow(app);
createIcon(app);
});

}

let c=0;
function add(){
c++;
document.getElementById("g").innerText=c;
}

</script>

</body>
</html>
