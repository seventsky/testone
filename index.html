<script>

/* =========================
   CLOCK
========================= */
setInterval(()=>{
let t=new Date()
clock.innerText=t.toLocaleTimeString().slice(0,5)
clockLogin.innerText=t.toLocaleTimeString().slice(0,5)
},1000)

/* =========================
   LOGIN
========================= */
function enter(){
login.style.opacity=0
setTimeout(()=>{
login.style.display="none"
init()
},300)
}

/* =========================
   THEME
========================= */
function setTheme(mode){
document.body.classList.toggle("light",mode==="light")
localStorage.setItem("theme",mode)
}

(function(){
let saved=localStorage.getItem("theme")
if(saved) setTheme(saved)
})()

/* =========================
   WINDOW SYSTEM
========================= */

let z = 1

function openApp(id){
let w = document.getElementById(id)

w.style.display = "flex"
requestAnimationFrame(()=>w.style.opacity = 1)

focus(w)
createTask(id)
updateTaskState(id,true)
}

function focus(win){
z++
win.style.zIndex = z
}

/* =========================
   TASKBAR
========================= */

function createTask(id){

if(document.getElementById("task-"+id)) return

let t = document.createElement("div")
t.className = "task"
t.id = "task-"+id
t.innerText = "▣"

t.onclick = ()=>toggleWindow(id)

apps.appendChild(t)
}

function updateTaskState(id,active){
let t = document.getElementById("task-"+id)
if(!t) return
t.style.background = active ? "rgba(0,255,150,0.3)" : "transparent"
}

function toggleWindow(id){
let w = document.getElementById(id)

if(w.style.display === "none"){
w.style.display = "flex"
requestAnimationFrame(()=>w.style.opacity = 1)
focus(w)
updateTaskState(id,true)
}else{
minimize(id)
}
}

function minimize(id){
let w = document.getElementById(id)
w.style.opacity = 0
setTimeout(()=>{
w.style.display = "none"
updateTaskState(id,false)
},200)
}

/* =========================
   DRAG + SNAP
========================= */

function enableDrag(win){
let bar = win.querySelector(".titlebar")

let isDragging = false
let offsetX = 0
let offsetY = 0

bar.addEventListener("mousedown", (e)=>{
isDragging = true
focus(win)

offsetX = e.clientX - win.offsetLeft
offsetY = e.clientY - win.offsetTop

document.addEventListener("mousemove", move)
document.addEventListener("mouseup", stop, {once:true})
})

function move(e){
if(!isDragging) return

win.style.left = (e.clientX - offsetX) + "px"
win.style.top = (e.clientY - offsetY) + "px"

/* SNAP */
if(e.clientY < 10){
maximize(win)
}

if(e.clientX < 10){
snapLeft(win)
}

if(e.clientX > window.innerWidth - 10){
snapRight(win)
}
}

function stop(){
isDragging = false
document.removeEventListener("mousemove", move)
}
}

/* SNAP FUNCTIONS */

function maximize(win){
win.style.top = "0"
win.style.left = "0"
win.style.width = "100%"
win.style.height = "calc(100vh - 48px)"
}

function snapLeft(win){
win.style.top = "0"
win.style.left = "0"
win.style.width = "50%"
win.style.height = "calc(100vh - 48px)"
}

function snapRight(win){
win.style.top = "0"
win.style.left = "50%"
win.style.width = "50%"
win.style.height = "calc(100vh - 48px)"
}

/* =========================
   ICON
========================= */

function createIcon(name,app){
let d=document.createElement("div")
d.className="icon"
d.innerHTML=name
d.ondblclick=()=>openApp(app)
desktop.appendChild(d)
}

/* =========================
   WINDOW
========================= */

function createWindow(id,title,html){
let w=document.createElement("div")
w.className="window"
w.id=id
w.style.opacity=0

w.innerHTML=`
<div class="titlebar">${title}</div>
<div class="content">${html}</div>`

document.body.appendChild(w)

w.style.top = Math.random()*200 + 60 + "px"
w.style.left = Math.random()*300 + 80 + "px"

enableDrag(w)

w.addEventListener("mousedown",()=>focus(w))
}

/* =========================
   INIT
========================= */

function init(){

createIcon("📰<br>log","files")
createIcon("📝<br>notes","editor")
createIcon("⌨<br>terminal","terminal")
createIcon("🎧<br>youtube","music")
createIcon("⚙️<br>settings","settings")

createWindow("files","files.exe","<div>📄 fragmento.txt</div>")

createWindow("editor","notes.exe","<textarea>escreva aqui...</textarea>")

createWindow("terminal","terminal.exe","<div>> ready</div>")

createWindow("music","youtube.exe",`
<div class="artist">🎧 forfun</div>
<div class="artist">🌑 xamã</div>
<div class="artist">☁ mac miller</div>
<div class="artist">⚡ mgk</div>
<div class="artist">🩸 sleep token</div>
`)

createWindow("settings","settings.exe",`
<div class="setting" onclick="setTheme('dark')">🌑 tema escuro</div>
<div class="setting" onclick="setTheme('light')">☀️ tema claro</div>
`)

}

</script>
