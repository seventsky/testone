<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v5</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",monospace;background:#05070a;color:#d1d5db;overflow:hidden}
.desktop{height:calc(100vh - 48px);padding:20px;display:grid;grid-template-columns:repeat(auto-fill,90px);gap:14px}
.icon{text-align:center;padding:6px;border-radius:6px;cursor:pointer}
.icon:hover{background:rgba(255,255,255,0.08)}
.window{position:absolute;width:520px;height:360px;background:#0b0f14;border:1px solid rgba(0,255,150,0.1);border-radius:8px;display:none;flex-direction:column;resize:both;overflow:hidden}
.titlebar{height:32px;background:#111;display:flex;justify-content:space-between;align-items:center;padding:0 10px;cursor:move}
.controls span{margin-left:10px;cursor:pointer}
.content{flex:1;padding:10px;overflow:auto}
.taskbar{height:48px;background:#111;display:flex;align-items:center;padding:0 10px;position:fixed;bottom:0;width:100%;z-index:9999}
.task{padding:6px 10px;margin:0 4px;border-radius:4px;cursor:pointer;background:rgba(255,255,255,0.05)}
.task.active{background:rgba(0,255,150,0.2)}
textarea{width:100%;height:100%;background:transparent;color:white;border:none;outline:none}
.file{padding:8px;background:#111;margin-bottom:6px;border-radius:6px;cursor:pointer}
.artist{padding:6px;margin-bottom:6px;background:#111;border-radius:6px}
canvas{background:black}
.max{top:0!important;left:0!important;width:100%!important;height:calc(100vh - 48px)!important;border-radius:0}
</style>
</head>
<body>

<div class="desktop">
<div class="icon" ondblclick="openApp('terminal')">⌨<br>terminal</div>
<div class="icon" ondblclick="openApp('music')">🎵<br>music</div>
<div class="icon" ondblclick="openApp('files')">📁<br>files</div>
<div class="icon" ondblclick="openApp('notes')">🧠<br>notes</div>
<div class="icon" ondblclick="openApp('browser')">🌐<br>browser</div>
<div class="icon" ondblclick="openApp('game')">🎮<br>game</div>
</div>

<!-- MUSIC -->
<div class="window" id="music" style="top:120px;left:240px">
<div class="titlebar">music.exe<div class="controls"><span onclick="minimize('music')">—</span><span onclick="maximize('music')">⬜</span><span onclick="closeApp('music')">✕</span></div></div>
<div class="content">
<div class="artist">🎸 forfun</div>
<div class="artist">🔥 xamã</div>
<div class="artist">🌙 mac miller</div>
<div class="artist">⚡ mgk</div>
<div class="artist">🕯️ sleep token</div>
</div>
</div>

<!-- FILES -->
<div class="window" id="files" style="top:160px;left:280px">
<div class="titlebar">files.exe<div class="controls"><span onclick="minimize('files')">—</span><span onclick="maximize('files')">⬜</span><span onclick="closeApp('files')">✕</span></div></div>
<div class="content">
<div class="file" onclick="openFile('f1')">fragmento.txt</div>
<div class="file" onclick="openFile('f2')">log.sys</div>
</div>
</div>

<!-- VIEWER -->
<div class="window" id="viewer" style="top:180px;left:320px">
<div class="titlebar">viewer.exe<div class="controls"><span onclick="minimize('viewer')">—</span><span onclick="maximize('viewer')">⬜</span><span onclick="closeApp('viewer')">✕</span></div></div>
<div class="content" id="fileContent"></div>
</div>

<!-- NOTES -->
<div class="window" id="notes" style="top:140px;left:200px">
<div class="titlebar">notes.exe<div class="controls"><span onclick="minimize('notes')">—</span><span onclick="maximize('notes')">⬜</span><span onclick="closeApp('notes')">✕</span></div></div>
<div class="content"><textarea id="note"></textarea></div>
</div>

<!-- BROWSER -->
<div class="window" id="browser" style="top:140px;left:260px">
<div class="titlebar">browser.exe<div class="controls"><span onclick="minimize('browser')">—</span><span onclick="maximize('browser')">⬜</span><span onclick="closeApp('browser')">✕</span></div></div>
<div class="content">
<input id="url" placeholder="https://..." style="width:100%">
<iframe id="frame" style="width:100%;height:90%"></iframe>
</div>
</div>

<!-- GAME -->
<div class="window" id="game" style="top:200px;left:300px">
<div class="titlebar">game.exe<div class="controls"><span onclick="minimize('game')">—</span><span onclick="maximize('game')">⬜</span><span onclick="closeApp('game')">✕</span></div></div>
<div class="content">
<canvas id="gameCanvas" width="300" height="200"></canvas>
</div>
</div>

<!-- TERMINAL -->
<div class="window" id="terminal" style="top:100px;left:200px">
<div class="titlebar">terminal.exe<div class="controls"><span onclick="minimize('terminal')">—</span><span onclick="maximize('terminal')">⬜</span><span onclick="closeApp('terminal')">✕</span></div></div>
<div class="content" id="termOut"></div>
<input id="termIn" style="background:black;color:#0f0;width:100%;border:none">
</div>

<!-- TASKBAR -->
<div class="taskbar">
<div class="task" onclick="openApp('terminal')">⌨</div>
<div class="task" onclick="openApp('music')">🎵</div>
<div class="task" onclick="openApp('files')">📁</div>
<div class="task" onclick="openApp('notes')">🧠</div>
<div class="task" onclick="openApp('browser')">🌐</div>
<div class="task" onclick="openApp('game')">🎮</div>
</div>

<script>
function openApp(id){let w=document.getElementById(id);w.style.display='flex';focus(w)}
function closeApp(id){document.getElementById(id).style.display='none'}
function minimize(id){document.getElementById(id).style.display='none'}
function maximize(id){document.getElementById(id).classList.toggle('max')}
function focus(win){document.querySelectorAll('.window').forEach(w=>w.style.zIndex=1);win.style.zIndex=999}

// DRAG

document.querySelectorAll('.window').forEach(win=>{
let bar=win.querySelector('.titlebar');let is=false,x,y;
bar.onmousedown=e=>{is=true;x=e.clientX-win.offsetLeft;y=e.clientY-win.offsetTop;focus(win)};
document.onmousemove=e=>{if(is&&!win.classList.contains('max')){win.style.left=(e.clientX-x)+'px';win.style.top=(e.clientY-y)+'px'}};
document.onmouseup=()=>is=false;
});

// FILES
function openFile(id){openApp('viewer');let c={f1:"fragmento: voce nao esta sozinho.",f2:"[log] atividade detectada..."};fileContent.innerText=c[id]}

// NOTES
let n=document.getElementById('note');n.value=localStorage.getItem('note')||"";n.oninput=()=>localStorage.setItem('note',n.value);

// TERMINAL
let out=document.getElementById('termOut');let input=document.getElementById('termIn');
input.addEventListener('keydown',e=>{if(e.key==='Enter'){let cmd=input.value;out.innerHTML+="<div>> "+cmd+"</div>";if(cmd==='help')out.innerHTML+="<div>help | open game</div>";else if(cmd==='open game')openApp('game');else out.innerHTML+="<div>unknown</div>";input.value='';}});

// SIMPLE GAME
let c=document.getElementById('gameCanvas');let ctx=c.getContext('2d');let x=10;
function loop(){ctx.clearRect(0,0,300,200);ctx.fillStyle='#0f0';ctx.fillRect(x,90,20,20);x+=1;if(x>300)x=0;requestAnimationFrame(loop)}
loop();

// BROWSER
url.addEventListener('keydown',e=>{if(e.key==='Enter')frame.src=url.value});

</script>

</body>
</html>
