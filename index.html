<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v28</title>

<style>

/* RESET BASE */
body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background:#0e1116;
color:#d1d5db;
overflow:hidden;
}

/* FUNDO */
body::after{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at center, rgba(255,255,255,0.03), transparent 70%);
pointer-events:none;
}

/* LOGIN */
#login{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:#0b0f14;
font-size:20px;
cursor:pointer;
z-index:99999;
color:#aaa;
}

/* DESKTOP */
#desktop{
position:absolute;
inset:0 0 48px 0;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:12px;
padding:20px;
align-content:start;
}

/* ICONES */
.icon{
width:80px;
height:80px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
border-radius:6px;
cursor:pointer;
transition:.15s;
user-select:none;
color:#ccc;
font-size:12px;
}

.icon:hover{
background:rgba(255,255,255,0.06);
}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:48px;
background:#181c22;
border-top:1px solid #2a2f36;
display:flex;
align-items:center;
padding:0 10px;
}

/* START */
.taskbar > div:first-child{
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
background:#232830;
border-radius:4px;
cursor:pointer;
}

/* TASKS */
.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 10px;
border-radius:4px;
cursor:pointer;
background:#232830;
border:1px solid #2f343b;
font-size:12px;
}

.task.active{
background:#3a3f46;
}

/* CLOCK */
#clock{
margin-left:auto;
font-size:12px;
color:#aaa;
}

/* WINDOWS */
.window{
position:absolute;
width:520px;
height:340px;
background:#1f2329;
border:1px solid #2f343b;
border-radius:6px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

/* TITLEBAR */
.titlebar{
background:#2a2f36;
padding:6px 8px;
display:flex;
justify-content:space-between;
cursor:move;
user-select:none;
font-size:13px;
border-bottom:1px solid #2f343b;
}

.titlebar span{
padding:0 6px;
cursor:pointer;
color:#aaa;
}

.titlebar span:hover{
color:#fff;
}

/* CONTENT */
.content{
flex:1;
padding:10px;
overflow:auto;
font-size:13px;
}

/* INPUTS */
button,input,textarea{
background:#111;
color:#ddd;
border:1px solid #333;
padding:6px;
width:100%;
margin-bottom:5px;
font-family:inherit;
font-size:13px;
}

button:hover{
background:#222;
cursor:pointer;
}

/* DETALHE */
#desktop::after{
content:"last session: unknown user";
position:absolute;
bottom:60px;
right:20px;
font-size:10px;
color:#444;
}

</style>
</head>

<body>

<div id="login" onclick="boot()">✧₊⁺ constelação</div>

<div id="desktop"></div>

<div class="taskbar">
<div>◼</div>
<div class="tasks" id="tasks"></div>
<div id="clock"></div>
</div>

<script>

/* ================= CORE ================= */

let Z=1;
let APP_REGISTRY={};
let FILES=[];

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* LOGIN */
function boot(){
login.style.display="none";
init();
}

/* ================= WINDOW ================= */

function createWindow(app){

let w=document.createElement("div");
w.className="window";
w.id=app.id;

w.style.left=(window.innerWidth/2-260)+"px";
w.style.top=(window.innerHeight/2-170)+"px";

w.innerHTML=`
<div class="titlebar">
${app.title}
<div>
<span onclick="min('${app.id}')">—</span>
<span onclick="closeW('${app.id}')">✕</span>
</div>
</div>
<div class="content">${app.content}</div>
`;

document.body.appendChild(w);
drag(w);
}

/* ICONS */
function createIcon(app){
let d=document.createElement("div");
d.className="icon";

d.innerHTML=`
<span style="font-size:26px">${app.icon}</span>
<div style="font-size:11px">${app.title}</div>
`;

d.onclick=()=>openApp(app.id);
desktop.appendChild(d);
}

/* SYSTEM */
function registerApp(app){
APP_REGISTRY[app.id]=app;
}

/* OPEN */
function openApp(id){
let w=document.getElementById(id);
if(!w) return;
w.style.display="flex";
focus(w);
}

/* MIN / CLOSE */
function min(id){
document.getElementById(id).style.display="none";
}

function closeW(id){min(id);}

/* FOCUS */
function focus(w){
Z++;
w.style.zIndex=Z;
}

/* ================= DRAG ================= */

function drag(win){
let bar=win.querySelector(".titlebar");
let active=false,x=0,y=0;

bar.onmousedown=e=>{
active=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(active){
win.style.left=(e.clientX-x)+"px";
win.style.top=(e.clientY-y)+"px";
}
};

document.onmouseup=()=>active=false;
}

/* ================= INIT ================= */

function init(){

FILES=[
{name:"talvez a verdadeira.log",content:"system active"},
{name:"melodia seja.dat",content:"constelação layer"},
{name:"a conversa.sys",content:"locked profile"},
{name:"entre as estrelas.sec",content:"secure boot active"}
];

/* FILES */
registerApp({
id:"files",
title:"files.exe",
icon:"📁",
content:`
<h3>FILES SYSTEM</h3>
${FILES.map(f=>`<div onclick="openFile('${f.name}')">📄 ${f.name}</div>`).join("")}
<textarea id="fileView"></textarea>
`
});

/* NOTES */
registerApp({
id:"notes",
title:"notes.exe",
icon:"📝",
content:`<textarea></textarea>`
});

/* SECRETS */
registerApp({
id:"secrets",
title:"secrets.exe",
icon:"🔐",
content:`
<textarea id="sec"></textarea>
<button onclick="out.innerText=encode(sec.value)">encode</button>
<button onclick="out.innerText=decode(sec.value)">decode</button>
<div id="out"></div>
`
});

/* PLAYLIST */
registerApp({
id:"playlist",
title:"playlist.exe",
icon:"🎧",
content:`forfun<br>xamã<br>mac miller<br>MGK<br>sleeptoken<br>kehlani`
});

/* MUSIC */
registerApp({
id:"music",
title:"music.exe",
icon:"🎵",
content:`<iframe width="100%" height="180"
src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>`
});

/* GAME */
registerApp({
id:"game",
title:"game.exe",
icon:"🎮",
content:`<button onclick="add()">click</button><div id="g">0</div>`
});

/* SEARCH */
registerApp({
id:"search",
title:"search.exe",
icon:"🔍",
content:`<input placeholder="search system">`
});

/* SETTINGS */
registerApp({
id:"settings",
title:"settings.exe",
icon:"⚙",
content:`
<button onclick="document.body.style.background='#000'">dark</button>
<button onclick="document.body.style.background='#e5e7eb'">light</button>
`
});

/* BUILD */
Object.values(APP_REGISTRY).forEach(app=>{
createWindow(app);
createIcon(app);
});

}

/* GAME */
let c=0;
function add(){
c++;
document.getElementById("g").innerText=c;
}

/* CRYPTO */
function encode(t){return btoa(unescape(encodeURIComponent(t)))}
function decode(t){try{return decodeURIComponent(escape(atob(t)))}catch(e){return "erro"}}

</script>

</body>
</html>
