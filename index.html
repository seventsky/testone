<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v16.1</title>

<style>
:root{
--bg:#05070a;
--bg2:#0f1722;
--panel:#0b0f14;
--text:#d1d5db;
--accent:#00ff9f;
}

body{
margin:0;
font-family:"Segoe UI", monospace;
background:radial-gradient(circle at top,var(--bg2),var(--bg));
color:var(--text);
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#05070a,#000);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
}

#clockLogin{
position:absolute;
top:40px;
font-size:40px;
opacity:.8;
}

.user{
cursor:pointer;
padding:20px;
border-radius:12px;
transition:.3s;
text-align:center;
}

.user:hover{
background:rgba(0,255,150,0.1);
transform:scale(1.05);
}

/* DESKTOP */
.desktop{
height:calc(100vh - 50px);
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:14px;
}

/* ICON */
.icon{
text-align:center;
cursor:pointer;
padding:6px;
border-radius:8px;
}
.icon:hover{background:rgba(255,255,255,0.05)}

/* TASKBAR */
.taskbar{
height:50px;
background:rgba(10,15,20,0.7);
display:flex;
align-items:center;
padding:0 10px;
position:fixed;
bottom:0;width:100%;
}

.task{
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}
.task.active{background:rgba(0,255,150,0.2)}

.clock{margin-left:auto}

/* WINDOW */
.window{
position:absolute;
width:520px;
height:360px;
background:var(--panel);
border:1px solid rgba(0,255,150,0.2);
border-radius:10px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
opacity:0;
transition:.2s;
}

.titlebar{
background:#111;
padding:8px;
cursor:move;
display:flex;
justify-content:space-between;
}

.content{
flex:1;
padding:10px;
overflow:auto;
}

/* INPUT */
input,textarea{
width:100%;
background:#000;
color:var(--accent);
border:none;
padding:6px;
outline:none;
}

/* TODO */
.todo{
padding:6px;
background:#111;
margin-bottom:6px;
cursor:pointer;
}
.done{opacity:.4;text-decoration:line-through}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div id="clockLogin"></div>

<div class="user" onclick="enter()">
🌌
<div>constelação</div>
</div>
</div>

<!-- DESKTOP -->
<div class="desktop" id="desktop"></div>

<!-- TASKBAR -->
<div class="taskbar">
<div id="tasks"></div>
<div class="clock" id="clock"></div>
</div>

<script>

/* CLOCK */
setInterval(()=>{
let t=new Date()
clock.innerText=t.toLocaleTimeString().slice(0,5)
clockLogin.innerText=t.toLocaleTimeString().slice(0,5)
},1000)

/* LOGIN */
function enter(){
login.style.opacity=0
setTimeout(()=>{
login.style.display="none"
init()
},300)
}

/* SYSTEM */
let z=1

function focus(w){
z++
w.style.zIndex=z
}

/* OPEN APP */
function openApp(id){
let w=document.getElementById(id)

w.style.display="flex"
requestAnimationFrame(()=>w.style.opacity=1)

focus(w)
createTask(id)
setActive(id,true)
}

/* MINIMIZE */
function minimize(id){
let w=document.getElementById(id)
w.style.opacity=0
setTimeout(()=>w.style.display="none",200)
setActive(id,false)
}

/* TASKBAR */
function createTask(id){
if(document.getElementById("task-"+id)) return

let t=document.createElement("div")
t.className="task"
t.id="task-"+id
t.innerText=id

t.onclick=()=>toggle(id)

tasks.appendChild(t)
}

function toggle(id){
let w=document.getElementById(id)
if(w.style.display==="none") openApp(id)
else minimize(id)
}

function setActive(id,state){
let t=document.getElementById("task-"+id)
if(t) t.classList.toggle("active",state)
}

/* DRAG */
function drag(win){
let bar=win.querySelector(".titlebar")

let is=false,x,y

bar.onmousedown=e=>{
is=true
x=e.clientX-win.offsetLeft
y=e.clientY-win.offsetTop
focus(win)
}

document.onmousemove=e=>{
if(is){
win.style.left=e.clientX-x+"px"
win.style.top=e.clientY-y+"px"
}
}

document.onmouseup=()=>is=false
}

/* CREATE WINDOW */
function createWindow(id,title,html){
let w=document.createElement("div")
w.className="window"
w.id=id

w.innerHTML=`
<div class="titlebar">
${title}
<div onclick="minimize('${id}')">—</div>
</div>
<div class="content">${html}</div>`

document.body.appendChild(w)

w.style.top=Math.random()*200+60+"px"
w.style.left=Math.random()*300+80+"px"

drag(w)
}

/* ICON */
function icon(name,id){
let d=document.createElement("div")
d.className="icon"
d.innerHTML=name
d.ondblclick=()=>openApp(id)
desktop.appendChild(d)
}

/* ================= APPS ================= */

/* NET */
function renderNet(){
net.innerHTML=`
<input placeholder="search...">
<h3>🌐 home</h3>
<div>🎧 music</div>
<div>📝 notes</div>
`
}

/* NOTES */
function saveNote(){
localStorage.setItem("note",note.value)
}

function loadNote(){
note.value=localStorage.getItem("note")||""
}

/* TODO */
function addTodo(){
let val=todoInput.value
if(!val) return

let list=JSON.parse(localStorage.getItem("todo")||"[]")
list.push({t:val,d:false})

localStorage.setItem("todo",JSON.stringify(list))
renderTodo()
todoInput.value=""
}

function renderTodo(){
let list=JSON.parse(localStorage.getItem("todo")||"[]")
todoList.innerHTML=""

list.forEach((e,i)=>{
let d=document.createElement("div")
d.className="todo "+(e.d?"done":"")
d.innerText=e.t

d.onclick=()=>{
e.d=!e.d
localStorage.setItem("todo",JSON.stringify(list))
renderTodo()
}

todoList.appendChild(d)
})
}

/* INIT */
function init(){

icon("🌐<br>net","net")
icon("📝<br>notes","notes")
icon("📋<br>todo","todo")
icon("⌨<br>terminal","terminal")

createWindow("net","net.exe","<div id='net'></div>")
createWindow("notes","notes.exe","<textarea id='note' oninput='saveNote()'></textarea>")
createWindow("todo","todo.exe","<input id='todoInput'><button onclick='addTodo()'>add</button><div id='todoList'></div>")
createWindow("terminal","terminal.exe","<div>> ready</div>")

renderNet()
loadNote()
renderTodo()

}

</script>

</body>
</html>
