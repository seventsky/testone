<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v19</title>

<style>
:root{
--bg:#05070a;
--bg2:#0f1722;
--panel:#0b0f14;
--text:#d1d5db;
--accent:#00ff9f;
}

body{
margin:0;
font-family:"Segoe UI", monospace;
background:radial-gradient(circle at top,var(--bg2),var(--bg));
color:var(--text);
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

/* DESKTOP */
.desktop{
position:absolute;
width:100%;
height:100%;
}

/* ICON */
.icon{
position:absolute;
width:80px;
text-align:center;
cursor:pointer;
}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
width:100%;
height:50px;
display:flex;
justify-content:center;
align-items:center;
background:rgba(10,15,20,0.8);
}

.task{padding:6px 10px;cursor:pointer}
.task.active{background:rgba(0,255,150,0.2)}

.clock{position:absolute;right:10px}

/* WINDOW */
.window{
position:absolute;
width:520px;height:360px;
background:var(--panel);
border:1px solid rgba(0,255,150,0.2);
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
}

.titlebar{
background:#111;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
}

.content{flex:1;padding:10px;overflow:auto}

</style>
</head>

<body>

<div id="login" onclick="enter()">🌌 constelação</div>

<div class="desktop" id="desktop"></div>

<div class="taskbar">
<div id="tasks"></div>
<div class="clock" id="clock"></div>
</div>

<script>

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5)
},1000)

/* LOGIN */
function enter(){
login.style.display="none"
init()
}

/* SYSTEM */
let z=1
function focus(w){z++;w.style.zIndex=z}

/* WINDOW */
function openApp(id){
let w=document.getElementById(id)
w.style.display="flex"
focus(w)
}

function closeApp(id){
document.getElementById(id).style.display="none"
}

/* TASKBAR */
const apps=["files","notes","todo","music","playlist","game","search"]

function initTaskbar(){
apps.forEach(id=>{
let t=document.createElement("div")
t.className="task"
t.innerText=id
t.onclick=()=>openApp(id)
tasks.appendChild(t)
})
}

/* DRAG */
function drag(win){
let bar=win.querySelector(".titlebar")
let is=false,x,y

bar.onmousedown=e=>{
is=true
x=e.clientX-win.offsetLeft
y=e.clientY-win.offsetTop
focus(win)
}

document.onmousemove=e=>{
if(is){
win.style.left=e.clientX-x+"px"
win.style.top=e.clientY-y+"px"
}
}

document.onmouseup=()=>is=false
}

/* WINDOW CREATE */
function createWindow(id,title,html){
let w=document.createElement("div")
w.className="window"
w.id=id

w.innerHTML=`
<div class="titlebar">${title}
<span onclick="closeApp('${id}')">✕</span>
</div>
<div class="content">${html}</div>
`

document.body.appendChild(w)
drag(w)
}

/* ICON */
function icon(name,id,x,y){
let d=document.createElement("div")
d.className="icon"
d.innerHTML=name
d.style.left=x+"px"
d.style.top=y+"px"
d.ondblclick=()=>openApp(id)
desktop.appendChild(d)
}

/* FILE SYSTEM COM PASTAS */
let fs = JSON.parse(localStorage.getItem("fs")||"null") || {
name:"root",
folders:[],
files:[]
}

let current = fs

function saveFS(){
localStorage.setItem("fs",JSON.stringify(fs))
}

function renderFS(){
explorer.innerHTML=`<h3>${current.name}</h3>`

current.folders.forEach(f=>{
let d=document.createElement("div")
d.innerText="📁 "+f.name
d.onclick=()=>{current=f;renderFS()}
explorer.appendChild(d)
})

current.files.forEach(f=>{
let d=document.createElement("div")
d.innerText="📄 "+f.name
d.onclick=()=>openFile(f)
explorer.appendChild(d)
})
}

function newFolder(){
let n=prompt("nome da pasta")
if(!n) return
current.folders.push({name:n,folders:[],files:[]})
saveFS()
renderFS()
}

function newFile(){
let n=prompt("nome do arquivo")
if(!n) return
current.files.push({name:n,content:""})
saveFS()
renderFS()
}

function openFile(f){
openApp("notes")
note.value=f.content
currentFile=f
}

let currentFile=null

function saveNote(){
if(currentFile){
currentFile.content=note.value
saveFS()
}
}

/* INIT */
function init(){

initTaskbar()

icon("📁 files","files",20,20)
icon("📝 notes","notes",20,100)
icon("📋 todo","todo",20,180)

createWindow("files","files.exe",`
<button onclick="newFolder()">+ pasta</button>
<button onclick="newFile()">+ arquivo</button>
<div id="explorer"></div>
`)

createWindow("notes","notes.exe",`
<textarea id="note" oninput="saveNote()"></textarea>
`)

renderFS()

}

</script>
</body>
</html>
