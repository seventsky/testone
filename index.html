<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v13</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:monospace;
background:radial-gradient(circle at top,#0f1722,#05070a);
color:#d1d5db;
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}
#loginBox{
background:#111;
padding:20px;
border:1px solid #0f0;
}

/* DESKTOP */
.desktop{
height:calc(100vh - 48px);
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:14px;
}

/* ICONES */
.icon{
text-align:center;
padding:6px;
cursor:pointer;
border-radius:6px;
}
.icon:hover{background:rgba(255,255,255,0.05)}

/* TASKBAR */
.taskbar{
height:48px;
background:rgba(10,15,20,0.9);
display:flex;
align-items:center;
padding:0 10px;
position:fixed;
bottom:0;
width:100%;
}

.start{cursor:pointer;padding:6px}
.apps{display:flex;gap:8px;margin-left:10px}
.task{padding:6px;cursor:pointer}

/* WINDOWS */
.window{
position:absolute;
width:520px;
height:360px;
background:#0b0f14;
border:1px solid rgba(0,255,150,0.2);
border-radius:8px;
display:none;
flex-direction:column;
resize:both;
overflow:hidden;
}

.titlebar{
height:32px;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
cursor:move;
}

.content{flex:1;padding:10px;overflow:auto}

/* FILE */
.file{padding:6px;background:#111;margin-bottom:6px;cursor:pointer}
.file:hover{background:rgba(0,255,150,0.2)}

/* EDITOR */
textarea{
width:100%;
height:100%;
background:#000;
color:#0f0;
border:none;
outline:none;
}

/* CONTEXT */
#menu{
position:absolute;
background:#111;
border:1px solid #0f0;
display:none;
}
#menu div{padding:6px;cursor:pointer}
#menu div:hover{background:rgba(0,255,150,0.2)}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div id="loginBox">
<input id="user" placeholder="user"><br><br>
<input id="pass" type="password" placeholder="password"><br><br>
<button onclick="enter()">login</button>
</div>
</div>

<!-- DESKTOP -->
<div class="desktop" id="desktop"></div>

<!-- TASKBAR -->
<div class="taskbar">
<div class="start">◼</div>
<div class="apps" id="apps"></div>
</div>

<script>

/* LOGIN */
function enter(){
if(user.value==="seven"){
login.style.display="none"
init()
}
}

/* FILESYSTEM */
let fs={
"C:":{
"Users":{"Seven":{"notes.txt":"bem-vindo"}},
"System":{"log.sys":"protected"}
}
}

let currentPath=["C:"]
let currentFile=null

function getDir(){return currentPath.reduce((a,b)=>a[b],fs)}
function listDir(){return Object.keys(getDir())}
function readFile(n){return getDir()[n]}
function writeFile(n,c){getDir()[n]=c}

/* WINDOW SYSTEM */
function openApp(id){
let w=document.getElementById(id)
w.style.display="flex"
focus(w)
}

function focus(w){
document.querySelectorAll(".window").forEach(x=>x.style.zIndex=1)
w.style.zIndex=999
}

/* DRAG */
document.addEventListener("mousedown",e=>{
if(e.target.classList.contains("titlebar")){
let win=e.target.parentElement
let shiftX=e.clientX-win.offsetLeft
let shiftY=e.clientY-win.offsetTop

function move(e){
win.style.left=e.clientX-shiftX+"px"
win.style.top=e.clientY-shiftY+"px"
}

document.addEventListener("mousemove",move)
document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true})
}
})

/* ICON */
function createIcon(name,app){
let d=document.createElement("div")
d.className="icon"
d.innerText=name
d.ondblclick=()=>openApp(app)
desktop.appendChild(d)
}

/* CREATE WINDOWS */
function createWindow(id,title,html){
let w=document.createElement("div")
w.className="window"
w.id=id

w.innerHTML=`
<div class="titlebar">${title}</div>
<div class="content">${html}</div>`

document.body.appendChild(w)
}

/* EXPLORER */
function renderExplorer(){
fileList.innerHTML=""
listDir().forEach(f=>{
let d=document.createElement("div")
let isFolder=typeof getDir()[f]==="object"

d.className="file"
d.innerText=(isFolder?"📁 ":"📄 ")+f

d.onclick=()=>{
if(isFolder){
currentPath.push(f)
renderExplorer()
}else{
currentFile=f
openApp("editor")
editor.value=readFile(f)
}
}

fileList.appendChild(d)
})
}

/* TERMINAL */
function term(){
input.onkeydown=e=>{
if(e.key==="Enter"){
let cmd=input.value
out.innerHTML+=`<div>> ${cmd}</div>`

let [b,a]=cmd.split(" ")

if(b==="ls") listDir().forEach(x=>out.innerHTML+=`<div>${x}</div>`)
if(b==="cd"){currentPath.push(a);renderExplorer()}
if(b==="touch"){getDir()[a]="";renderExplorer()}

input.value=""
}
}
}

/* INIT */
function init(){

createIcon("📁 files","files")
createIcon("⌨ terminal","terminal")
createIcon("📝 notes","editor")

createWindow("files","files.exe","<div id='fileList'></div>")
createWindow("editor","editor.exe","<textarea id='editor'></textarea>")
createWindow("terminal","terminal.exe","<div id='out'></div><input id='input'>")

setTimeout(renderExplorer,100)
setTimeout(term,100)

/* AUTO SAVE */
setInterval(()=>{
if(currentFile){
writeFile(currentFile,editor.value)
}
},1000)

}

</script>

</body>
</html>
