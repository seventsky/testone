<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v23 FULL</title>

<style>
:root{
--bg:#05070a;
--panel:#0b0f14;
--text:#d1d5db;
--accent:#00ff9f;
}

body{
margin:0;
font-family:"Segoe UI", monospace;
background:#000;
color:var(--text);
overflow:hidden;
}

/* LOGIN */
#login{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
cursor:pointer;
z-index:9999;
}

/* DESKTOP */
.desktop{
position:absolute;
width:100%;
height:calc(100% - 48px);
}

/* ICONS */
.icon{
width:80px;
position:absolute;
text-align:center;
cursor:pointer;
padding:6px;
border-radius:8px;
user-select:none;
}
.icon:hover{background:rgba(255,255,255,0.05)}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
width:100%;
height:48px;
background:#0a0f14;
display:flex;
align-items:center;
padding:0 10px;
}

.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}
.task.active{background:#00ff9f33}

/* WINDOW SYSTEM */
.window{
position:absolute;
width:500px;
height:340px;
background:var(--panel);
border:1px solid #00ff9f33;
border-radius:10px;
display:none;
flex-direction:column;
overflow:hidden;
resize:both;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.titlebar{
background:#111;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
}

.content{
flex:1;
padding:10px;
overflow:auto;
}

button,input,textarea{
background:#000;
color:var(--accent);
border:none;
padding:6px;
width:100%;
margin-bottom:5px;
}

/* PREVIEW */
.preview{
padding:8px;
margin-top:8px;
border:1px solid var(--accent);
background:#000;
}

/* START MENU */
.start-menu{
position:fixed;
bottom:60px;
left:10px;
width:200px;
background:#111;
padding:10px;
display:none;
border-radius:8px;
}

.start-item{
padding:6px;
cursor:pointer;
}
.start-item:hover{background:#00ff9f22}
</style>
</head>

<body>

<div id="login" onclick="enter()">🌌 constelação</div>

<div class="desktop" id="desktop"></div>

<div class="taskbar">
<div class="start" onclick="toggleStart()">◼</div>
<div class="tasks" id="tasks"></div>
<div id="clock"></div>
</div>

<div class="start-menu" id="startMenu"></div>

<script>

/* ================= CORE ================= */

let z=1;
let apps=["files","notes","todo","music","playlist","game","search","settings"];

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* LOGIN */
function enter(){
login.style.display="none";
init();
}

/* ================= WINDOW ================= */

function createWindow(id,title,html){

let w=document.createElement("div");
w.className="window";
w.id=id;

w.style.left=(window.innerWidth/2-250)+"px";
w.style.top=(window.innerHeight/2-170)+"px";

w.innerHTML=`
<div class="titlebar">${title}
<div>
<span onclick="min('${id}')">—</span>
<span onclick="closeW('${id}')">✕</span>
</div>
</div>
<div class="content">${html}</div>
`;

document.body.appendChild(w);
drag(w);
}

function openApp(id){
let w=document.getElementById(id);
w.style.display="flex";
focus(w);
}

function min(id){
document.getElementById(id).style.display="none";
}

function closeW(id){min(id);}

function focus(w){
z++;
w.style.zIndex=z;
}

/* DRAG */
function drag(win){
let bar=win.querySelector(".titlebar");
let active=false,x=0,y=0;

bar.onmousedown=e=>{
active=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(active){
win.style.left=e.clientX-x+"px";
win.style.top=e.clientY-y+"px";
}
};

document.onmouseup=()=>active=false;
}

/* ================= TASKBAR ================= */

function initTaskbar(){
apps.forEach(a=>{
let t=document.createElement("div");
t.className="task";
t.innerText=a;
t.onclick=()=>openApp(a);
tasks.appendChild(t);
});
}

/* ================= START ================= */

function toggleStart(){
startMenu.style.display=
startMenu.style.display==="block"?"none":"block";
}

/* ================= GAME ================= */

let score=parseInt(localStorage.getItem("score")||"0");

function addScore(){
score++;
localStorage.setItem("score",score);
document.getElementById("score").innerText="score: "+score;
}

/* ================= INIT ================= */

function init(){

initTaskbar();

/* FILES */
createWindow("files","files.exe",`
📁 system.log<br>
📁 memory.dat
`);

/* NOTES */
createWindow("notes","notes.exe",`
<textarea id="note"></textarea>
<div class="preview"></div>
`);

/* TODO */
createWindow("todo","todo.exe",`
<input placeholder="task">
<button>add</button>
`);

/* MUSIC */
createWindow("music","music.exe",`
🎧 forfun<br>
🌑 xamã<br>
☁ mac miller<br>
⚡ mgk<br>
🌙 sleep token
`);

/* PLAYLIST */
createWindow("playlist","playlist.exe",`
<iframe width="100%" height="180"
src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>
`);

/* GAME */
createWindow("game","game.exe",`
<h3>🎮 click system</h3>
<button onclick="addScore()">CLICK</button>
<div id="score">score: ${score}</div>
`);

/* SEARCH */
createWindow("search","search.exe",`
<input placeholder="search system">
<div>no results</div>
`);

/* SETTINGS */
createWindow("settings","settings.exe",`
<h3>settings</h3>
<button onclick="document.body.style.background='#000'">dark</button>
<button onclick="document.body.style.background='#111'">gray</button>
`);

}

</script>
</body>
</html>
