<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Seven OS v27 </title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial, sans-serif;
background:#0e1116;
color:#d1d5db;
overflow:hidden;
}

/* DESKTOP */
#desktop{
position:absolute;
inset:0 0 48px 0;
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:10px;
padding:15px;
}

/* ICON */
.icon{
width:80px;
text-align:center;
cursor:pointer;
color:#ccc;
font-size:12px;
}

.icon:hover{
background:rgba(255,255,255,0.05);
}

/* TASKBAR */
.taskbar{
position:fixed;
bottom:0;
left:0;
right:0;
height:48px;
background:#181c22;
display:flex;
align-items:center;
padding:0 8px;
border-top:1px solid #2a2f36;
}

/* START */
.start{
width:40px;
height:40px;
background:#222;
display:flex;
align-items:center;
justify-content:center;
border-radius:4px;
cursor:pointer;
}

/* TASKS */
.tasks{
display:flex;
gap:6px;
margin-left:10px;
}

.task{
padding:6px 12px;
background:#222;
border-radius:4px;
cursor:pointer;
font-size:12px;
}

.task.active{
background:#3a3f46;
}

/* CLOCK */
#clock{
margin-left:auto;
font-size:12px;
}

/* WINDOW */
.window{
position:absolute;
width:520px;
height:340px;
background:#1f2329;
border:1px solid #2f343b;
border-radius:6px;
display:none;
flex-direction:column;
box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

/* TITLEBAR */
.titlebar{
background:#2a2f36;
padding:6px;
display:flex;
justify-content:space-between;
cursor:move;
font-size:13px;
}

.titlebar span{
cursor:pointer;
padding:0 6px;
}

.titlebar span:hover{
color:#fff;
}

/* CONTENT */
.content{
flex:1;
padding:10px;
overflow:auto;
}

/* INPUT */
button,input,textarea{
background:#111;
color:#ddd;
border:1px solid #333;
padding:6px;
width:100%;
margin-bottom:5px;
}

</style>
</head>

<body>

<div id="desktop"></div>

<div class="taskbar">
<div class="start">◼</div>
<div class="tasks" id="tasks"></div>
<div id="clock"></div>
</div>

<script>

/* CORE */
let Z=1;
let APP_REGISTRY={};
let FILES={};
let TASKS={};

/* CLOCK */
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString().slice(0,5);
},1000);

/* WINDOW */
function createWindow(app){

let w=document.createElement("div");
w.className="window";
w.id=app.id;

w.style.left="200px";
w.style.top="120px";

w.innerHTML=`
<div class="titlebar">
${app.title}
<div>
<span onclick="min('${app.id}')">—</span>
<span onclick="closeW('${app.id}')">✕</span>
</div>
</div>
<div class="content">${app.content}</div>
`;

document.body.appendChild(w);
drag(w);
}

/* ICON */
function createIcon(app){
let d=document.createElement("div");
d.className="icon";

d.innerHTML=`
<div style="font-size:26px">${app.icon}</div>
${app.title}
`;

d.onclick=()=>openApp(app.id);
desktop.appendChild(d);
}

/* TASKBAR APP */
function addTask(app){
if(TASKS[app.id]) return;

let t=document.createElement("div");
t.className="task";
t.innerText=app.title;

t.onclick=()=>openApp(app.id);

tasks.appendChild(t);
TASKS[app.id]=t;
}

/* SYSTEM */
function registerApp(app){
APP_REGISTRY[app.id]=app;
}

/* OPEN */
function openApp(id){
let w=document.getElementById(id);
let app=APP_REGISTRY[id];

if(!w) return;

w.style.display="flex";
focus(w);

addTask(app);

/* active */
Object.values(TASKS).forEach(t=>t.classList.remove("active"));
TASKS[id].classList.add("active");
}

/* MIN */
function min(id){
document.getElementById(id).style.display="none";
TASKS[id].classList.remove("active");
}

/* CLOSE */
function closeW(id){
min(id);
}

/* FOCUS */
function focus(w){
Z++;
w.style.zIndex=Z;
}

/* DRAG */
function drag(win){
let bar=win.querySelector(".titlebar");
let active=false,x=0,y=0;

bar.onmousedown=e=>{
active=true;
x=e.clientX-win.offsetLeft;
y=e.clientY-win.offsetTop;
focus(win);
};

document.onmousemove=e=>{
if(active){
win.style.left=(e.clientX-x)+"px";
win.style.top=(e.clientY-y)+"px";
}
};

document.onmouseup=()=>active=false;
}

/* INIT */
function init(){

registerApp({
id:"notes",
title:"notes.exe",
icon:"📝",
content:`<textarea></textarea>`
});

registerApp({
id:"secrets",
title:"secrets.exe",
icon:"🔐",
content:`
<textarea id="sec"></textarea>
<button onclick="out.innerText=btoa(sec.value)">encode</button>
<button onclick="out.innerText=atob(sec.value)">decode</button>
<div id="out"></div>
`
});

registerApp({
id:"music",
title:"music.exe",
icon:"🎵",
content:`<iframe width="100%" height="180" src="https://www.youtube.com/embed/jfKfPfyJRdk"></iframe>`
});

/* BUILD */
Object.values(APP_REGISTRY).forEach(app=>{
createWindow(app);
createIcon(app);
});

}

init();

</script>

</body>
</html>
